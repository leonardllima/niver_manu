<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧺 Piquenique da Manu!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&family=Nunito:wght@700;900&display=swap');
:root{--yellow:#ffe066;--mint:#4dffd2;--pink:#ff6b9d;--green:#22c55e;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Nunito',sans-serif;background:#1a5c12;
  touch-action:none;user-select:none;
}
canvas{display:block;position:fixed;top:0;left:0;z-index:0;}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;display:flex;
  justify-content:space-between;align-items:center;
  padding:6px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,.65)0%,transparent 100%);
  z-index:10;pointer-events:none;display:none;
}
#hud-phase{font-family:'Fredoka One',cursive;font-size:clamp(.9rem,3vw,1.3rem);color:#fff;text-shadow:0 0 8px var(--yellow);}
#hud-hits {font-family:'Fredoka One',cursive;font-size:clamp(.9rem,3vw,1.3rem);color:var(--mint);}
#hud-tries{font-size:clamp(.8rem,2.5vw,1.1rem);}

/* BUTTONS */
#btn-back{position:fixed;top:8px;left:12px;z-index:30;font-family:'Fredoka One',cursive;font-size:.85rem;color:#fff;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:5px 12px;cursor:pointer;}
#btn-pause{position:fixed;top:8px;right:12px;z-index:30;font-family:'Fredoka One',cursive;font-size:.85rem;color:#fff;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:5px 12px;cursor:pointer;display:none;}

/* DRAG HINT */
#hint{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-family:'Bubblegum Sans',cursive;font-size:clamp(.8rem,2.2vw,.95rem);
  color:rgba(255,255,255,.85);background:rgba(0,0,0,.5);
  padding:6px 18px;border-radius:28px;z-index:10;pointer-events:none;
  transition:opacity .4s;
}
#hint.hide{opacity:0;}

/* WIND INDICATOR */
#wind-hud{
  position:fixed;top:40px;right:14px;z-index:10;pointer-events:none;
  font-family:'Bubblegum Sans',cursive;font-size:.82rem;color:#fde68a;display:none;
}

/* SCREENS */
.screen{
  position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:20;gap:12px;padding:20px;
}
.screen.show{display:flex;}
.sbg-green{background:rgba(4,28,4,.93);backdrop-filter:blur(12px);}
.sbg-dark {background:rgba(8,2,24,.93);backdrop-filter:blur(12px);}

.s-emoji{font-size:clamp(2.5rem,7vw,4rem);animation:floaty 1.6s ease-in-out infinite alternate;}
@keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.s-title{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,6vw,3.4rem);text-align:center;line-height:1.1;}
.col-y{color:var(--yellow);text-shadow:0 0 20px var(--yellow);}
.col-m{color:var(--mint);text-shadow:0 0 20px var(--mint);}
.col-p{color:var(--pink);text-shadow:0 0 20px var(--pink);}
.s-sub{font-family:'Bubblegum Sans',cursive;font-size:clamp(.9rem,2.8vw,1.25rem);color:#a7f3d0;text-align:center;line-height:1.6;max-width:380px;}
.s-info{font-family:'Bubblegum Sans',cursive;font-size:clamp(.8rem,2.2vw,1rem);color:#fde68a;text-align:center;background:rgba(0,0,0,.3);padding:6px 16px;border-radius:18px;}

/* BUBBLE SLOT */
.bslot{width:140px;height:140px;position:relative;flex-shrink:0;}
.bslot canvas{position:absolute;top:0;left:0;border-radius:50%;}

/* BUTTONS */
.btn{padding:12px 38px;font-family:'Fredoka One',cursive;font-size:clamp(.95rem,2.8vw,1.3rem);color:#fff;border:none;border-radius:50px;cursor:pointer;letter-spacing:1px;box-shadow:0 5px 0 rgba(0,0,0,.4);transition:transform .1s;}
.btn:active{transform:translateY(4px);}
.btn-g{background:linear-gradient(135deg,#22c55e,#15803d);}
.btn-o{background:linear-gradient(135deg,#f97316,#c2410c);}
.btn-gr{background:linear-gradient(135deg,#6b7280,#374151);}
.btn-y{background:linear-gradient(135deg,var(--yellow),#f59e0b);color:#1a0535;}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-phase">Fase 1/8</div>
  <div id="hud-hits">🎯 0/0</div>
  <div id="hud-tries"></div>
</div>
<div id="wind-hud"></div>
<button id="btn-back"  onclick="location.href='index.html'">🏠</button>
<button id="btn-pause" onclick="togglePause()">⏸</button>
<div    id="hint">👆 Arraste o item e solte para lançar!</div>

<!-- PHASE INTRO -->
<div id="s-intro" class="screen sbg-green show">
  <div class="s-emoji" id="i-emoji">🌿</div>
  <div class="s-title col-y" id="i-title">Fase 1 de 8</div>
  <div class="s-sub"  id="i-sub">Acerte a cesta!</div>
  <div class="s-info" id="i-info"></div>
  <button class="btn btn-g" id="btn-play">▶ JOGAR</button>
  <button class="btn btn-gr" onclick="location.href='index.html'" style="margin-top:-4px;">🏠 Menu</button>
</div>

<!-- PHASE WIN -->
<div id="s-win" class="screen sbg-green">
  <div class="s-emoji">🎉</div>
  <div class="s-title col-m">FASE CONCLUÍDA!</div>
  <div class="bslot"><canvas id="c-win" width="140" height="140"></canvas></div>
  <div class="s-sub" id="w-msg">Ótimo arremesso!</div>
  <button class="btn btn-g"  id="btn-next">Próxima Fase ➡</button>
  <button class="btn btn-gr" onclick="location.href='index.html'">🏠 Menu</button>
</div>

<!-- GAME OVER -->
<div id="s-over" class="screen sbg-dark">
  <div class="s-emoji">😢</div>
  <div class="s-title col-p">GAME OVER!</div>
  <div class="bslot"><canvas id="c-over" width="140" height="140"></canvas></div>
  <div class="s-sub" id="o-msg">Tente de novo!</div>
  <button class="btn btn-o"  id="btn-retry">🔁 Tentar Novamente</button>
  <button class="btn btn-gr" onclick="location.href='index.html'">🏠 Menu</button>
</div>

<!-- PAUSE -->
<div id="s-pause" class="screen sbg-green">
  <div class="s-emoji">⏸️</div>
  <div class="s-title col-y">PAUSADO</div>
  <button class="btn btn-g"  onclick="togglePause()">▶ Continuar</button>
  <button class="btn btn-o"  id="btn-restart">🔁 Reiniciar Fase</button>
  <button class="btn btn-gr" onclick="location.href='index.html'">🏠 Menu</button>
</div>

<!-- CLEAR -->
<div id="s-clear" class="screen sbg-green">
  <div class="s-emoji">🏆</div>
  <div class="s-title col-y">PARABÉNS<br>MANU! 🎉</div>
  <div class="s-sub">Completou todas as 8 fases!<br>Você é incrível! 💕</div>
  <button class="btn btn-g"  id="btn-again">🎮 Jogar de Novo</button>
  <button class="btn btn-gr" onclick="location.href='index.html'">🏠 Menu</button>
</div>

<audio id="gmus" loop><source src="game_music.mp3" type="audio/mpeg"></audio>

<script>
'use strict';

/* ═══════════════════════════════════
   CANVAS
═══════════════════════════════════ */
const C  = document.getElementById('gc');
const X  = C.getContext('2d');

function resize(){
  C.width  = window.innerWidth;
  C.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); sceneInit(); });

/* ═══════════════════════════════════
   PHASE TABLE
═══════════════════════════════════ */
//  hits  = food items to land in basket
//  tries = total throws allowed
//  bw/bh = basket size fraction of canvas W/H
//  move  = basket moves left-right
//  speed = pixels per frame basket moves
//  wind  = max horizontal push per frame (random sign each frame)
//  grav  = gravity multiplier
//  bounce= basket also moves vertically
const PHASES = [
  {hits:3,  tries:7, bw:.20, bh:.14, move:false, speed:0,   wind:0,    grav:1,   bounce:false, emoji:'🌿', label:'Acerte 3 itens na cesta!'},
  {hits:4,  tries:7, bw:.17, bh:.13, move:false, speed:0,   wind:0,    grav:1,   bounce:false, emoji:'🌸', label:'Cesta menor — acerte 4!'},
  {hits:5,  tries:6, bw:.16, bh:.12, move:true,  speed:1.4, wind:0,    grav:1,   bounce:false, emoji:'🍃', label:'Cesta em movimento!'},
  {hits:6,  tries:6, bw:.15, bh:.11, move:true,  speed:1.8, wind:.055, grav:1,   bounce:false, emoji:'💨', label:'Vento fraco — acerte 6!'},
  {hits:7,  tries:5, bw:.13, bh:.10, move:true,  speed:2.2, wind:.09,  grav:1,   bounce:false, emoji:'🌬️',label:'Vento forte — acerte 7!'},
  {hits:8,  tries:5, bw:.12, bh:.09, move:true,  speed:2.7, wind:.12,  grav:1.1, bounce:false, emoji:'⚡', label:'Gravidade extra — 8!'},
  {hits:9,  tries:4, bw:.11, bh:.09, move:true,  speed:3.3, wind:.14,  grav:1.1, bounce:true,  emoji:'🔥', label:'Cesta saltitante — 9!'},
  {hits:10, tries:4, bw:.10, bh:.08, move:true,  speed:4.0, wind:.18,  grav:1.2, bounce:true,  emoji:'👑', label:'MODO FINAL — acerte 10!'},
];

/* ═══════════════════════════════════
   IMAGES
═══════════════════════════════════ */
function loadImg(src){
  const img = new Image();
  img.ok = false;
  img.onload = () => img.ok = true;
  img.src = src;
  return img;
}
const itemImgs   = ['item1.png','item2.png','item3.png','item4.png','item5.png','item6.png'].map(loadImg);
const avancouImg = loadImg('avancou.png');
const gameoverImg= loadImg('gameover.jpg');

/* ═══════════════════════════════════
   GAME STATE
═══════════════════════════════════ */
let phaseIdx  = 0;
let hitsNeeded= 0;
let triesLeft = 0;
let hitsGot   = 0;
let paused    = false;
let playing   = false;   // true while the gameplay canvas is active

/* projectile states */
const S = {IDLE:0, DRAG:1, FLY:2, DONE:3};
let pState = S.IDLE;

/* ═══════════════════════════════════
   SCENE VARIABLES
   All positions computed in sceneInit
   so they adapt to any screen size.
═══════════════════════════════════ */

/* Slingshot: anchor is the pocket (centre between fork tips) */
let SL = {ax:0, ay:0,   // anchor / rest position of projectile
          lx:0, ly:0,   // left fork tip
          rx:0, ry:0};  // right fork tip

/* Basket */
let BK = {x:0, y:0, w:0, h:0, vx:0, bt:0};

/* Projectile */
const PR = {x:0, y:0, vx:0, vy:0, r:0, rot:0, imgIdx:0, trail:[]};

/* Drag tracking */
let dragOn = false;
let dragX  = 0;
let dragY  = 0;

/* Particles */
let parts = [];

/* Animated background */
let clouds = [];
let trees  = [];
let bgTick = 0;

/* ═══════════════════════════════════
   PHYSICS CONSTANTS
═══════════════════════════════════ */
const GRAV      = 0.50;   // px/frame² base gravity
const MAX_PULL  = () => Math.min(C.width * .17, 120);  // max drag distance
const LAUNCH_K  = 0.28;   // speed = pull_distance * LAUNCH_K  px/frame

/* ═══════════════════════════════════
   sceneInit  — call after resize or phase change
═══════════════════════════════════ */
function sceneInit(){
  const W = C.width, H = C.height;
  const cfg = PHASES[phaseIdx];

  /* Ground level at 68% height */
  const GROUND = H * .68;

  /* Slingshot: sits at 18% from left, fork at 10% above ground */
  SL.ax = W * .18;
  SL.ay = GROUND - H * .02;        // pocket rests just above ground

  const forkH = H * .11;           // fork height above pocket
  SL.lx = SL.ax - W * .032;        SL.ly = SL.ay - forkH;
  SL.rx = SL.ax + W * .032;        SL.ry = SL.ay - forkH;

  /* Basket: right side, sitting on ground */
  BK.w  = W * cfg.bw;
  BK.h  = H * cfg.bh;
  BK.x  = W * .74 - BK.w / 2;
  BK.y  = GROUND  - BK.h;
  BK.vx = cfg.speed * (Math.random() < .5 ? 1 : -1);
  BK.bt = 0;

  /* Projectile radius */
  PR.r = Math.max(14, Math.min(W * .025, 26));

  /* Animated scenery */
  clouds = [
    {x: W*.12, y: H*.09, sc:1.0,  spd:.20},
    {x: W*.45, y: H*.06, sc:0.72, spd:.14},
    {x: W*.75, y: H*.11, sc:0.88, spd:.17},
    {x: W*.30, y: H*.17, sc:0.60, spd:.11},
  ];
  trees = [
    {x:W*.40, layer:.9},
    {x:W*.58, layer:.75},
    {x:W*.88, layer:1.0},
    {x:W*.06, layer:.85},
  ];

  projReset();
}

/* ═══════════════════════════════════
   projReset  — put projectile back on slingshot
═══════════════════════════════════ */
function projReset(){
  PR.x  = SL.ax;
  PR.y  = SL.ay;
  PR.vx = 0;
  PR.vy = 0;
  PR.rot= 0;
  PR.trail = [];
  PR.imgIdx = Math.floor(Math.random() * itemImgs.length);
  pState    = S.IDLE;
  dragOn    = false;
}

/* ═══════════════════════════════════
   PHYSICS STEP  — called once per frame when FLY
═══════════════════════════════════ */
function physicsStep(){
  if(paused || pState !== S.FLY) return;

  const cfg = PHASES[phaseIdx];

  /* Gravity */
  PR.vy += GRAV * cfg.grav;

  /* Wind: tiny random horizontal push */
  if(cfg.wind > 0){
    PR.vx += (Math.random() * 2 - 1) * cfg.wind;
  }

  /* Move */
  PR.x += PR.vx;
  PR.y += PR.vy;
  PR.rot += PR.vx * .06;

  /* Trail */
  PR.trail.push({x:PR.x, y:PR.y});
  if(PR.trail.length > 26) PR.trail.shift();

  /* ── COLLISION CHECK ── */
  if(hitBasket()){
    pState = S.DONE;
    hitsGot++;
    spawnParts(PR.x, PR.y);
    updateHUD();
    if(hitsGot >= hitsNeeded){
      setTimeout(showWin, 450);
    } else {
      setTimeout(() => { triesLeft--; updateHUD(); projReset(); }, 550);
    }
    return;
  }

  /* ── OUT OF BOUNDS ── */
  const GROUND = C.height * .68;
  if(PR.y > GROUND + PR.r * 2 || PR.x > C.width + 80 || PR.x < -80){
    pState = S.DONE;
    triesLeft--;
    updateHUD();
    if(triesLeft <= 0){
      setTimeout(showOver, 400);
    } else {
      setTimeout(projReset, 420);
    }
  }
}

/* ═══════════════════════════════════
   COLLISION
   The projectile hits when its centre crosses the basket
   opening (top zone, moving downward).
═══════════════════════════════════ */
function hitBasket(){
  if(PR.vy < 0) return false;           // must be falling downward
  const openTop    = BK.y;
  const openBottom = BK.y + BK.h * .25;
  return (
    PR.x > BK.x &&
    PR.x < BK.x + BK.w &&
    PR.y > openTop  - PR.r &&
    PR.y < openBottom + PR.r
  );
}

/* ═══════════════════════════════════
   BASKET MOVEMENT
═══════════════════════════════════ */
function basketStep(){
  if(paused) return;
  const cfg = PHASES[phaseIdx];
  if(!cfg.move) return;

  BK.x += BK.vx;
  const minX = C.width * .48;
  const maxX = C.width * .96 - BK.w;
  if(BK.x < minX || BK.x > maxX) BK.vx *= -1;

  if(cfg.bounce){
    BK.bt += .055;
    BK.y = (C.height * .68 - BK.h) + Math.sin(BK.bt) * C.height * .055;
  }
}

/* ═══════════════════════════════════
   PARTICLES
═══════════════════════════════════ */
function spawnParts(x, y){
  const cols = ['#ffe066','#ff6b9d','#4dffd2','#c44dff','#ff7043','#22c55e'];
  for(let i = 0; i < 22; i++){
    parts.push({
      x, y,
      vx:(Math.random()-.5)*14,
      vy:(Math.random()-.5)*14 - 5,
      r: 3 + Math.random() * 8,
      c: cols[Math.floor(Math.random()*cols.length)],
      l: 1
    });
  }
}

/* ═══════════════════════════════════
   DRAW — BACKGROUND
═══════════════════════════════════ */
function drawBg(){
  if(!paused) bgTick += .008;
  const W = C.width, H = C.height, G = H * .68;
  const cfg = PHASES[phaseIdx];

  /* Sky */
  const sky = X.createLinearGradient(0, 0, 0, G);
  sky.addColorStop(0, '#6ac8f0');
  sky.addColorStop(1, '#d4effa');
  X.fillStyle = sky; X.fillRect(0, 0, W, G);

  /* Animated clouds */
  clouds.forEach(cl => {
    if(!paused) cl.x += cl.spd;
    if(cl.x > W + 120) cl.x = -120;
    drawCloud(cl.x, cl.y, cl.sc);
  });

  /* Rolling hills — 3 layers */
  drawHill(W, H, '#52c251', G, .055, bgTick*.25, 1.0);
  drawHill(W, H, '#3db53c', G, .042, bgTick*.45, 1.35);
  drawHill(W, H, '#2da42c', G, .030, bgTick*.70, 1.7);

  /* Flat ground */
  const grd = X.createLinearGradient(0, G, 0, H);
  grd.addColorStop(0,  '#4ade80');
  grd.addColorStop(.15,'#22c55e');
  grd.addColorStop(1,  '#14532d');
  X.fillStyle = grd; X.fillRect(0, G, W, H - G);

  /* Ground edge */
  X.strokeStyle = '#15803d'; X.lineWidth = 2;
  X.beginPath(); X.moveTo(0, G); X.lineTo(W, G); X.stroke();

  /* Flowers */
  X.font = Math.max(11, W * .021) + 'px serif';
  X.textAlign = 'center';
  const fl = ['🌸','🌼','🌺','🌻','🌷'];
  for(let i = 0; i < 14; i++){
    const fx = W * (.03 + i * .069);
    const fy = G + 2 + Math.sin(bgTick * 1.8 + i) * 2.5;
    X.fillText(fl[i % fl.length], fx, fy);
  }

  /* Background trees (parallax) */
  trees.forEach(t => {
    if(!paused) t.x -= t.layer * .16;
    if(t.x < -60) t.x = W + 60;
    drawTree(t.x, G, W * .048 * t.layer);
  });

  /* Picnic cloth under slingshot */
  drawCloth();

  /* Wind arrow on screen */
  if(cfg.wind > 0 && playing){
    const we = document.getElementById('wind-hud');
    we.style.display = 'block';
    we.textContent = '🌬️ Vento ' + (BK.vx > 0 ? '→' : '←');
  }
}

function drawHill(W, H, color, groundY, amp, phase, freq){
  X.fillStyle = color;
  X.beginPath();
  X.moveTo(0, H);
  for(let x = 0; x <= W; x += 3){
    const y = groundY - Math.sin(x / W * Math.PI * freq + phase) * H * amp;
    x === 0 ? X.moveTo(x, y) : X.lineTo(x, y);
  }
  X.lineTo(W, H); X.closePath(); X.fill();
}

function drawCloud(cx, cy, sc){
  const r = C.width * .055 * sc;
  X.fillStyle = 'rgba(255,255,255,.88)';
  [[0,0,1],[r*.72,r*.18,.68],[-(r*.58),r*.18,.58],[r*.22,r*.28,.78]].forEach(([ox,oy,f])=>{
    X.beginPath(); X.arc(cx+ox, cy+oy, r*f, 0, Math.PI*2); X.fill();
  });
}

function drawTree(tx, groundY, sz){
  X.fillStyle = '#854d0e';
  X.fillRect(tx - sz*.11, groundY - sz*.55, sz*.22, sz*.55);
  [[0,-.75,.38,'#166534'],[-.22,-.60,.27,'#15803d'],[.24,-.62,.24,'#16a34a']].forEach(([ox,oy,f,c])=>{
    X.fillStyle = c;
    X.beginPath(); X.arc(tx + sz*ox, groundY + sz*oy, sz*f, 0, Math.PI*2); X.fill();
  });
}

function drawCloth(){
  const px = SL.ax - C.width * .03;
  const py = C.height * .68;
  const w  = C.width  * .11;
  const h  = C.height * .038;
  const cx = C.getContext('2d');
  X.save();
  X.fillStyle = '#ef4444';
  X.fillRect(px - w/2, py - h, w, h);
  X.fillStyle = 'rgba(255,255,255,.45)';
  for(let i=0;i<4;i++) for(let j=0;j<2;j++)
    if((i+j)%2===0) X.fillRect(px-w/2+i*(w/4), py-h+j*(h/2), w/4, h/2);
  X.restore();
}

/* ═══════════════════════════════════
   DRAW — SLINGSHOT
═══════════════════════════════════ */
function drawSling(){
  const W = C.width, H = C.height, G = H * .68;
  const LW = Math.max(5, W * .010);

  /* Trunk */
  X.strokeStyle = '#92400e'; X.lineWidth = LW * 1.4; X.lineCap = 'round';
  X.beginPath(); X.moveTo(SL.ax, G + 4); X.lineTo(SL.ax, SL.ly + H*.02); X.stroke();

  /* Fork arms */
  X.lineWidth = LW;
  X.beginPath(); X.moveTo(SL.ax, SL.ly + H*.02); X.lineTo(SL.lx, SL.ly); X.stroke();
  X.beginPath(); X.moveTo(SL.ax, SL.ly + H*.02); X.lineTo(SL.rx, SL.ry); X.stroke();

  /* Fork tip dots */
  X.fillStyle = '#78350f';
  X.beginPath(); X.arc(SL.lx, SL.ly, W*.012, 0, Math.PI*2); X.fill();
  X.beginPath(); X.arc(SL.rx, SL.ry, W*.012, 0, Math.PI*2); X.fill();

  /* Elastic bands — always draw, connect to current projectile pos */
  const px = PR.x, py = PR.y;
  X.strokeStyle = '#a16207'; X.lineWidth = 3; X.lineCap = 'round';
  X.beginPath(); X.moveTo(SL.lx, SL.ly); X.lineTo(px, py); X.stroke();
  X.beginPath(); X.moveTo(SL.rx, SL.ry); X.lineTo(px, py); X.stroke();
}

/* ═══════════════════════════════════
   DRAW — BASKET (cartoon style)
═══════════════════════════════════ */
function drawBasket(){
  const bx = BK.x, by = BK.y, bw = BK.w, bh = BK.h;

  /* Drop shadow */
  X.fillStyle = 'rgba(0,0,0,.18)';
  X.beginPath();
  X.ellipse(bx + bw/2, by + bh + 4, bw*.55, bh*.12, 0, 0, Math.PI*2);
  X.fill();

  /* Body — rounded trapezoid */
  X.fillStyle = '#c2830a';
  X.beginPath();
  X.moveTo(bx + bw*.05, by);
  X.lineTo(bx + bw*.95, by);
  X.quadraticCurveTo(bx + bw*1.04, by, bx + bw*1.02, by + bh*.4);
  X.lineTo(bx + bw*.98,  by + bh);
  X.lineTo(bx + bw*.02,  by + bh);
  X.lineTo(bx - bw*.02,  by + bh*.4);
  X.quadraticCurveTo(bx - bw*.04, by, bx + bw*.05, by);
  X.closePath(); X.fill();

  /* Darker base */
  X.fillStyle = '#92400e';
  X.beginPath();
  X.moveTo(bx + bw*.02, by + bh*.65);
  X.lineTo(bx + bw*.98, by + bh*.65);
  X.lineTo(bx + bw*.98, by + bh);
  X.lineTo(bx + bw*.02, by + bh);
  X.closePath(); X.fill();

  /* Wicker horizontal lines */
  X.strokeStyle = '#78350f'; X.lineWidth = 1.5;
  for(let i = 1; i < 5; i++){
    const gy = by + bh * (i/5);
    X.beginPath(); X.moveTo(bx, gy); X.lineTo(bx+bw, gy); X.stroke();
  }
  /* Wicker vertical lines */
  for(let i = 1; i < 7; i++){
    const gx = bx + bw*(i/7);
    X.beginPath(); X.moveTo(gx, by); X.lineTo(gx, by+bh); X.stroke();
  }

  /* Inside depth shade */
  X.fillStyle = 'rgba(0,0,0,.18)';
  X.fillRect(bx + bw*.03, by, bw*.94, bh*.18);

  /* Gingham top cloth */
  const clothY = by - bh*.06;
  const clothH = bh * .22;
  X.fillStyle = '#fef3c7';
  X.fillRect(bx, clothY, bw, clothH);
  X.fillStyle = 'rgba(239,68,68,.35)';
  for(let i=0;i<4;i++) for(let j=0;j<2;j++)
    if((i+j)%2===0) X.fillRect(bx+i*(bw/4), clothY+j*(clothH/2), bw/4, clothH/2);

  /* Handle arc */
  X.strokeStyle = '#92400e'; X.lineWidth = Math.max(3, bw*.07); X.lineCap = 'round';
  X.beginPath();
  X.arc(bx + bw/2, by - bh*.18, bw*.32, Math.PI, 0);
  X.stroke();
  /* Handle highlight */
  X.strokeStyle = '#fcd34d'; X.lineWidth = Math.max(1.5, bw*.025);
  X.beginPath();
  X.arc(bx + bw/2, by - bh*.18, bw*.32, Math.PI, 0);
  X.stroke();

  /* Rim highlight (golden opening) */
  X.strokeStyle = '#fcd34d'; X.lineWidth = 4;
  X.shadowColor = '#fcd34d'; X.shadowBlur = 10;
  X.beginPath();
  X.moveTo(bx + bw*.05, by);
  X.lineTo(bx + bw*.95, by);
  X.stroke();
  X.shadowBlur = 0;

  /* Flowers decoration on basket */
  X.font = Math.max(8, bh*.32) + 'px serif';
  X.textAlign = 'center';
  X.fillText('🌸', bx + bw*.18, by + bh*.55);
  X.fillText('🌼', bx + bw*.82, by + bh*.55);
}

/* ═══════════════════════════════════
   DRAW — PLAYER CHARACTER
   Sits to the LEFT of the slingshot.
   Uses avancouImg as face.
═══════════════════════════════════ */
function drawPlayer(){
  const W = C.width, H = C.height, G = H * .68;
  /* Character centre-x is 12% left of slingshot */
  const px  = SL.ax - W * .12;
  const py  = G;                      // feet on ground
  const hr  = Math.max(16, W * .036); // head radius

  /* Ground shadow */
  X.fillStyle = 'rgba(0,0,0,.18)';
  X.beginPath();
  X.ellipse(px, py + 3, hr * 1.1, hr * .28, 0, 0, Math.PI*2);
  X.fill();

  /* Legs */
  X.fillStyle = '#fca5a5';
  X.fillRect(px - hr*.34, py - hr*.85, hr*.28, hr*.88);
  X.fillRect(px + hr*.06, py - hr*.85, hr*.28, hr*.88);
  /* Shoes */
  X.fillStyle = '#7c3aed';
  X.fillRect(px - hr*.40, py - hr*.05, hr*.36, hr*.18);
  X.fillRect(px + hr*.04, py - hr*.05, hr*.36, hr*.18);

  /* Dress / body */
  const dg = X.createLinearGradient(px - hr*.7, py - hr*2.2, px + hr*.7, py);
  dg.addColorStop(0, '#f9a8d4'); dg.addColorStop(1, '#db2777');
  X.fillStyle = dg;
  X.beginPath();
  X.moveTo(px - hr*.28, py - hr*1.85);
  X.lineTo(px + hr*.28, py - hr*1.85);
  X.lineTo(px + hr*.72, py);
  X.lineTo(px - hr*.72, py);
  X.closePath(); X.fill();

  /* Dress shine */
  X.fillStyle = 'rgba(255,255,255,.14)';
  X.beginPath();
  X.moveTo(px - hr*.20, py - hr*1.85);
  X.lineTo(px + hr*.05, py - hr*1.85);
  X.lineTo(px - hr*.10, py - hr*.70);
  X.lineTo(px - hr*.45, py - hr*.70);
  X.closePath(); X.fill();

  /* Dress hem frills */
  for(let i=0;i<5;i++){
    const fx = px - hr*.72 + i*(hr*1.44/4);
    X.fillStyle = i%2===0 ? '#f9a8d4' : '#ec4899';
    X.beginPath(); X.arc(fx + hr*.18, py, hr*.11, 0, Math.PI*2); X.fill();
  }

  /* Arm pointing at slingshot */
  X.strokeStyle = '#fca5a5'; X.lineWidth = Math.max(4, W*.006); X.lineCap = 'round';
  X.beginPath();
  X.moveTo(px + hr*.22, py - hr*1.65);
  X.lineTo(SL.ax - W*.032, SL.ay - H*.01);
  X.stroke();

  /* Neck */
  X.fillStyle = '#fca5a5';
  X.fillRect(px - hr*.14, py - hr*2.4, hr*.28, hr*.22);

  /* Head circle */
  X.fillStyle = '#fde68a';
  X.beginPath(); X.arc(px, py - hr*2.6, hr, 0, Math.PI*2); X.fill();

  /* Avatar photo face */
  if(avancouImg.ok){
    X.save();
    X.beginPath(); X.arc(px, py - hr*2.6, hr, 0, Math.PI*2); X.clip();
    X.drawImage(avancouImg, px-hr, py-hr*2.6-hr, hr*2, hr*2);
    X.restore();
  } else {
    /* fallback eyes+smile */
    X.fillStyle = '#5b21b6';
    X.beginPath(); X.arc(px-hr*.27, py-hr*2.65, hr*.12, 0, Math.PI*2); X.fill();
    X.beginPath(); X.arc(px+hr*.27, py-hr*2.65, hr*.12, 0, Math.PI*2); X.fill();
    X.strokeStyle = '#9d174d'; X.lineWidth = 2;
    X.beginPath(); X.arc(px, py-hr*2.48, hr*.22, 0, Math.PI); X.stroke();
  }

  /* Outline around head for contrast */
  X.strokeStyle = 'rgba(0,0,0,.20)'; X.lineWidth = 2.5;
  X.beginPath(); X.arc(px, py - hr*2.6, hr + 1, 0, Math.PI*2); X.stroke();

  /* Hair */
  X.fillStyle = '#6d28d9';
  X.beginPath(); X.ellipse(px, py-hr*3.2, hr*.94, hr*.58, 0, Math.PI, Math.PI*2); X.fill();

  /* Bow */
  X.fillStyle = '#f0abfc';
  X.beginPath(); X.ellipse(px+hr*.55, py-hr*3.22, 12, 8,  Math.PI/5, 0, Math.PI*2); X.fill();
  X.beginPath(); X.ellipse(px+hr*.55, py-hr*3.22, 12, 8, -Math.PI/5, 0, Math.PI*2); X.fill();
  X.fillStyle = '#e879f9';
  X.beginPath(); X.arc(px+hr*.55, py-hr*3.22, 4.5, 0, Math.PI*2); X.fill();
}

/* ═══════════════════════════════════
   DRAW — PROJECTILE
═══════════════════════════════════ */
function drawProj(){
  /* Trail (only during flight) */
  if(pState === S.FLY && PR.trail.length > 1){
    X.strokeStyle = 'rgba(255,220,60,.40)';
    X.lineWidth   = 2.5; X.lineCap = 'round';
    X.beginPath();
    X.moveTo(PR.trail[0].x, PR.trail[0].y);
    PR.trail.forEach(pt => X.lineTo(pt.x, pt.y));
    X.stroke();
  }

  /* Sprite */
  const img = itemImgs[PR.imgIdx];
  X.save();
  X.translate(PR.x, PR.y); X.rotate(PR.rot);
  X.shadowColor = '#ffe066'; X.shadowBlur = 14;
  if(img.ok){
    X.drawImage(img, -PR.r, -PR.r, PR.r*2, PR.r*2);
  } else {
    X.fillStyle = '#fcd34d';
    X.beginPath(); X.arc(0, 0, PR.r, 0, Math.PI*2); X.fill();
  }
  X.shadowBlur = 0;
  X.restore();
}

/* ═══════════════════════════════════
   DRAW — AIM GUIDE (dotted trajectory preview)
═══════════════════════════════════ */
function drawAim(){
  if(pState !== S.DRAG) return;

  /* Vector from proj back to anchor = launch direction */
  const dx    = SL.ax - PR.x;
  const dy    = SL.ay - PR.y;
  const pull  = Math.sqrt(dx*dx + dy*dy);
  const power = Math.min(pull, MAX_PULL()) / MAX_PULL();
  if(power < .04) return;

  const speed = pull * LAUNCH_K;       // mirrors launch formula
  const ang   = Math.atan2(dy, dx);
  let svx     = Math.cos(ang) * speed;
  let svy     = Math.sin(ang) * speed;
  const cfg   = PHASES[phaseIdx];

  X.fillStyle = 'rgba(255,230,60,.65)';
  let px = PR.x, py = PR.y;
  for(let i = 0; i < 55; i++){
    svy += GRAV * cfg.grav;
    px  += svx;
    py  += svy;
    if(i % 3 === 0){
      const r = Math.max(.4, 4.8 - i * .075);
      X.globalAlpha = 0.72 - i * .012;
      X.beginPath(); X.arc(px, py, r, 0, Math.PI*2); X.fill();
    }
    if(py > C.height * .70) break;
  }
  X.globalAlpha = 1;

  /* Power bar */
  const bw = Math.min(C.width * .13, 110);
  const bx = SL.ax - bw / 2;
  const bY = SL.ay + C.height * .075;
  X.fillStyle = 'rgba(0,0,0,.45)';
  X.beginPath(); X.roundRect(bx, bY, bw, 9, 4); X.fill();
  const barColor = power > .72 ? '#ef4444' : power > .42 ? '#f97316' : '#22c55e';
  X.fillStyle = barColor;
  X.beginPath(); X.roundRect(bx, bY, bw * power, 9, 4); X.fill();
  X.font = Math.max(10, C.width * .017) + 'px "Bubblegum Sans",cursive';
  X.fillStyle = '#fff'; X.textAlign = 'center';
  X.fillText('Força ' + Math.round(power * 100) + '%', SL.ax, bY + 22);
  X.textAlign = 'left';
}

/* ═══════════════════════════════════
   DRAW — PARTICLES
═══════════════════════════════════ */
function drawParts(){
  for(let i = parts.length - 1; i >= 0; i--){
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += .35; p.l -= .03;
    if(p.l <= 0){ parts.splice(i,1); continue; }
    X.globalAlpha = p.l; X.fillStyle = p.c;
    X.beginPath(); X.arc(p.x, p.y, p.r, 0, Math.PI*2); X.fill();
  }
  X.globalAlpha = 1;
}

/* ═══════════════════════════════════
   MAIN LOOP
═══════════════════════════════════ */
let rafId = null;
function loop(){
  X.clearRect(0, 0, C.width, C.height);
  drawBg();
  drawSling();
  drawAim();
  drawBasket();
  drawProj();
  drawPlayer();
  drawParts();
  if(!paused){
    physicsStep();
    basketStep();
  }
  rafId = requestAnimationFrame(loop);
}

/* ═══════════════════════════════════
   INPUT — drag & release to fire
═══════════════════════════════════ */
function getXY(e){
  const rect = C.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function onDown(e){
  if(!playing || paused || pState !== S.IDLE) return;
  const p = getXY(e);
  /* Accept touch in left 45% of screen for easy mobile use */
  if(p.x < C.width * .45){
    dragOn = true;
    pState = S.DRAG;
    /* Snap projectile to touch/click immediately */
    clampProjToDrag(p.x, p.y);
    document.getElementById('hint').classList.add('hide');
    e.preventDefault();
  }
}

function onMove(e){
  if(!dragOn || pState !== S.DRAG) return;
  const p = getXY(e);
  clampProjToDrag(p.x, p.y);
  e.preventDefault();
}

function clampProjToDrag(ex, ey){
  const dx   = ex - SL.ax;
  const dy   = ey - SL.ay;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const mp   = MAX_PULL();
  if(dist < 1){ PR.x = SL.ax; PR.y = SL.ay; return; }
  const ratio = Math.min(dist, mp) / dist;
  PR.x = SL.ax + dx * ratio;
  PR.y = SL.ay + dy * ratio;
}

function onUp(e){
  if(!dragOn || pState !== S.DRAG) return;
  dragOn = false;

  /* Vector from PROJ back to ANCHOR is the launch direction */
  const dx   = SL.ax - PR.x;
  const dy   = SL.ay - PR.y;
  const pull = Math.sqrt(dx*dx + dy*dy);

  if(pull < C.width * .012){
    /* Too small a pull — cancel */
    projReset(); return;
  }

  const speed = pull * LAUNCH_K;
  const ang   = Math.atan2(dy, dx);
  PR.vx = Math.cos(ang) * speed;
  PR.vy = Math.sin(ang) * speed;
  pState = S.FLY;
  e.preventDefault && e.preventDefault();
}

C.addEventListener('mousedown',  onDown,  false);
C.addEventListener('mousemove',  onMove,  false);
C.addEventListener('mouseup',    onUp,    false);
C.addEventListener('touchstart', onDown,  {passive:false});
C.addEventListener('touchmove',  onMove,  {passive:false});
C.addEventListener('touchend',   onUp,    {passive:false});

/* ═══════════════════════════════════
   PAUSE
═══════════════════════════════════ */
function togglePause(){
  if(!playing) return;
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '▶' : '⏸';
  showOnly(paused ? 's-pause' : null);
}
window.addEventListener('keydown', e => {
  if(e.key==='Escape'||e.key==='p'||e.key==='P') togglePause();
});

/* ═══════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════ */
const SCREENS = ['s-intro','s-win','s-over','s-pause','s-clear'];
function showOnly(id){
  SCREENS.forEach(s => {
    const el = document.getElementById(s);
    id === s ? el.classList.add('show') : el.classList.remove('show');
  });
}

/* ═══════════════════════════════════
   BUBBLE PHOTO (same system as game1)
═══════════════════════════════════ */
function drawCirclePhoto(canvasEl, img, borderColor, scale){
  const c=canvasEl, x=c.getContext('2d');
  const cx=c.width/2, cy=c.height/2, r=Math.min(cx,cy)-4;
  x.clearRect(0,0,c.width,c.height);
  if(scale<.01) return;
  x.save(); x.translate(cx,cy); x.scale(scale,scale);
  x.save(); x.beginPath(); x.arc(0,0,r,0,Math.PI*2); x.clip();
  if(img&&img.ok) x.drawImage(img,-r,-r,r*2,r*2);
  else{
    const fg=x.createRadialGradient(0,0,0,0,0,r);
    fg.addColorStop(0,'#14532d'); fg.addColorStop(1,'#052e16');
    x.fillStyle=fg; x.beginPath(); x.arc(0,0,r,0,Math.PI*2); x.fill();
    x.fillStyle='#a7f3d0'; x.font='bold '+(r*.7)+'px serif';
    x.textAlign='center'; x.textBaseline='middle'; x.fillText('🌟',0,0);
  }
  x.restore();
  x.strokeStyle=borderColor||'#22c55e'; x.lineWidth=5;
  x.shadowColor=borderColor||'#22c55e'; x.shadowBlur=22;
  x.beginPath(); x.arc(0,0,r,0,Math.PI*2); x.stroke(); x.shadowBlur=0;
  const sh=x.createRadialGradient(-r*.3,-r*.35,r*.02,-r*.15,-r*.2,r*.75);
  sh.addColorStop(0,'rgba(255,255,255,.40)'); sh.addColorStop(1,'rgba(255,255,255,0)');
  x.fillStyle=sh; x.beginPath(); x.arc(0,0,r,0,Math.PI*2); x.fill();
  x.restore();
}
function animBubble(canvasEl, img, borderColor){
  canvasEl._stop=false; let t=0;
  function frame(){
    if(canvasEl._stop) return; t++;
    const POP=30, sc=t<=POP ? 1-(1-t/POP)**3 : 1+Math.sin((t-POP)*.07)*.04;
    drawCirclePhoto(canvasEl,img,borderColor,sc);
    requestAnimationFrame(frame);
  }
  frame();
}
function stopBubble(el){ el._stop=true; }

/* ═══════════════════════════════════
   HUD
═══════════════════════════════════ */
function updateHUD(){
  const cfg = PHASES[phaseIdx];
  document.getElementById('hud-phase').textContent = 'Fase '+(phaseIdx+1)+'/8';
  document.getElementById('hud-hits' ).textContent = '🎯 '+hitsGot+'/'+hitsNeeded;
  document.getElementById('hud-tries').textContent =
    '🍕'.repeat(Math.max(0,triesLeft)) + '⬛'.repeat(Math.max(0,cfg.tries-triesLeft));
}

/* ═══════════════════════════════════
   PHASE FLOW
═══════════════════════════════════ */
function showIntro(){
  playing = false; paused = false;
  const cfg = PHASES[phaseIdx];
  document.getElementById('hud').style.display       = 'none';
  document.getElementById('wind-hud').style.display  = 'none';
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('hint').classList.remove('hide');
  document.getElementById('i-emoji').textContent = cfg.emoji;
  document.getElementById('i-title').textContent = 'Fase '+(phaseIdx+1)+' de 8';
  document.getElementById('i-sub'  ).textContent = cfg.label;
  document.getElementById('i-info' ).textContent =
    '🎯 Acerte '+cfg.hits+
    ' • 🍕 '+cfg.tries+' arremessos'+
    (cfg.wind>0   ? ' • 🌬️ Vento'     : '')+
    (cfg.move     ? ' • 🔀 Cesta move' : '')+
    (cfg.bounce   ? ' • ↕ Saltita'     : '');
  showOnly('s-intro');
}

function startPhase(){
  const cfg = PHASES[phaseIdx];
  hitsNeeded = cfg.hits; triesLeft = cfg.tries; hitsGot = 0;
  sceneInit();
  showOnly(null);
  document.getElementById('hud').style.display       = 'flex';
  document.getElementById('btn-pause').style.display = 'block';
  document.getElementById('btn-pause').textContent   = '⏸';
  document.getElementById('hint').classList.remove('hide');
  updateHUD();
  playing = true; paused = false;
  document.getElementById('gmus').play().catch(()=>{});
}

function showWin(){
  playing = false;
  document.getElementById('hud').style.display       = 'none';
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('w-msg').textContent =
    phaseIdx < 7 ? 'Fase '+(phaseIdx+1)+' concluída! 🌟' : 'Você é incrível, Manu! 🏆';
  const c = document.getElementById('c-win');
  stopBubble(c); animBubble(c, avancouImg, '#4dffd2');
  showOnly('s-win');
}

function showOver(){
  playing = false;
  document.getElementById('hud').style.display       = 'none';
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('o-msg').textContent = 'Acertou '+hitsGot+' de '+hitsNeeded+'. Vai lá!';
  const c = document.getElementById('c-over');
  stopBubble(c); animBubble(c, gameoverImg, '#ff6b9d');
  showOnly('s-over');
}

function nextPhase(){
  phaseIdx++;
  if(phaseIdx >= PHASES.length){
    showOnly('s-clear'); return;
  }
  showIntro();
}

function retryPhase(){ showIntro(); }
function playAgain() { phaseIdx = 0; showIntro(); }

/* ═══════════════════════════════════
   BUTTON WIRING
═══════════════════════════════════ */
document.getElementById('btn-play'   ).addEventListener('click', startPhase);
document.getElementById('btn-next'   ).addEventListener('click', nextPhase);
document.getElementById('btn-retry'  ).addEventListener('click', retryPhase);
document.getElementById('btn-again'  ).addEventListener('click', playAgain);
document.getElementById('btn-restart').addEventListener('click', () => {
  paused = false;
  document.getElementById('btn-pause').textContent = '⏸';
  retryPhase();
});

/* ═══════════════════════════════════
   BOOT
═══════════════════════════════════ */
showIntro();
loop();
</script>
