<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🧺 Piquenique da Manu!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&family=Nunito:wght@700;900&display=swap');
:root{--pink:#ff6b9d;--purple:#c44dff;--yellow:#ffe066;--mint:#4dffd2;--green:#22c55e;--bg:#0a1a08;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);touch-action:none;user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;z-index:0;}

/* ── UI OVERLAY ── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,.7)0%,transparent 100%);z-index:10;pointer-events:none;}
#hud-phase{font-family:'Fredoka One',cursive;font-size:clamp(1rem,3.5vw,1.5rem);color:#fff;text-shadow:0 0 10px var(--yellow);}
#hud-hits{font-family:'Fredoka One',cursive;font-size:clamp(1rem,3.5vw,1.5rem);color:var(--mint);}
#hud-tries{font-size:clamp(.9rem,3vw,1.3rem);letter-spacing:2px;}
#hud-wind{font-family:'Bubblegum Sans',cursive;font-size:clamp(.8rem,2.5vw,1.1rem);color:#fde68a;position:fixed;top:46px;right:16px;z-index:10;pointer-events:none;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;}
.screen.hidden{display:none;}
#screen-menu{background:linear-gradient(160deg,rgba(6,20,4,.95)0%,rgba(10,50,15,.95)100%);}
#screen-phase{background:rgba(6,20,4,.92);backdrop-filter:blur(10px);}
#screen-win-phase{background:rgba(6,20,4,.92);backdrop-filter:blur(10px);}
#screen-fail{background:rgba(20,4,4,.92);backdrop-filter:blur(10px);}
#screen-gameclear{background:rgba(6,20,4,.92);backdrop-filter:blur(10px);}

.s-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,7vw,4rem);color:var(--yellow);text-align:center;text-shadow:0 0 30px var(--yellow);animation:glow 1.8s ease-in-out infinite alternate;margin-bottom:8px;}
@keyframes glow{from{text-shadow:0 0 20px var(--yellow);}to{text-shadow:0 0 50px #ffb347,0 0 80px var(--yellow);}}
.s-sub{font-family:'Bubblegum Sans',cursive;font-size:clamp(1rem,3.5vw,1.4rem);color:#a7f3d0;text-align:center;line-height:1.6;margin-bottom:16px;}
.s-info{font-family:'Bubblegum Sans',cursive;font-size:clamp(.85rem,2.5vw,1.1rem);color:#fde68a;text-align:center;margin-bottom:12px;}
.btn-g{padding:14px 44px;font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,3.5vw,1.5rem);color:#fff;border:none;border-radius:50px;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 0 rgba(0,0,0,.4);transition:transform .1s;margin:4px;}
.btn-g:active{transform:translateY(4px);}
.btn-green{background:linear-gradient(135deg,#22c55e,#15803d);}
.btn-orange{background:linear-gradient(135deg,#f97316,#c2410c);}
.btn-grey{background:linear-gradient(135deg,#6b7280,#374151);}
.phase-emoji{font-size:clamp(2.5rem,8vw,4.5rem);animation:floaty 1.5s ease-in-out infinite alternate;margin-bottom:6px;}
@keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-12px)}}

/* drag hint */
#drag-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-family:'Bubblegum Sans',cursive;font-size:clamp(.85rem,2.5vw,1.1rem);color:rgba(255,255,255,.7);background:rgba(0,0,0,.45);padding:7px 20px;border-radius:30px;z-index:10;pointer-events:none;backdrop-filter:blur(3px);}
#drag-hint.hidden{display:none;}

/* back button */
#btn-back{position:fixed;top:8px;left:16px;z-index:30;font-family:'Fredoka One',cursive;font-size:1rem;color:#fff;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 16px;cursor:pointer;backdrop-filter:blur(4px);}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="hud-phase">Fase 1</div>
  <div id="hud-hits">🎯 0/0</div>
  <div id="hud-tries">🍕🍕🍕</div>
</div>
<div id="hud-wind" style="display:none"></div>
<div id="drag-hint">👆 Arraste para mirar e solte para lançar!</div>
<button id="btn-back" onclick="goHub()">🏠 Menu</button>

<!-- MENU PHASE INTRO -->
<div id="screen-phase" class="screen hidden">
  <div class="phase-emoji" id="p-emoji">🌿</div>
  <div class="s-title" id="p-title">Fase 1</div>
  <div class="s-sub" id="p-sub">Acerte a cesta!</div>
  <div class="s-info" id="p-info"></div>
  <button class="btn-g btn-green" id="btn-start-phase">▶ JOGAR</button>
</div>

<!-- WIN PHASE -->
<div id="screen-win-phase" class="screen hidden">
  <div class="phase-emoji">🎉</div>
  <div class="s-title" style="color:var(--mint)">ACERTOU! 🎯</div>
  <div class="s-sub" id="wp-msg">Fase concluída!</div>
  <button class="btn-g btn-green" id="btn-next-phase">Próxima Fase ➡</button>
</div>

<!-- FAIL -->
<div id="screen-fail" class="screen hidden">
  <div class="phase-emoji">😢</div>
  <div class="s-title" style="color:var(--pink)">ACABOU!</div>
  <div class="s-sub" id="fail-msg">Sem arremessos!</div>
  <button class="btn-g btn-orange" id="btn-retry">🔁 Tentar Novamente</button>
  <button class="btn-g btn-grey" onclick="goHub()">🏠 Menu</button>
</div>

<!-- GAME CLEAR -->
<div id="screen-gameclear" class="screen hidden">
  <div class="phase-emoji">🏆</div>
  <div class="s-title">PARABÉNS<br>MANU! 🎉</div>
  <div class="s-sub">Você completou todas as<br>8 fases do Piquenique! 💕</div>
  <button class="btn-g btn-green" id="btn-play-again">🎮 Jogar de Novo</button>
  <button class="btn-g btn-grey" onclick="goHub()">🏠 Menu</button>
</div>

<audio id="sfx-hit" src="menu_music.mp3" style="display:none"></audio>
<audio id="game-music" loop><source src="game_music.mp3" type="audio/mpeg"></audio>

<script>
'use strict';
function goHub(){ window.location.href='index.html'; }

/* ══════════════════════════
   CANVAS
══════════════════════════ */
const C=document.getElementById('gc'), X=C.getContext('2d');
function resize(){ C.width=innerWidth; C.height=innerHeight; }
resize(); window.addEventListener('resize',()=>{ resize(); initScene(); });

/* ══════════════════════════
   PHASE CONFIGS
══════════════════════════ */
const PHASES=[
  // {hits, tries, basketW, basketH, basketMove, moveSpeed, wind, gravity, bouncy}
  {hits:3,  tries:6, bw:.18, bh:.12, move:false, mspd:0,   wind:0,    gravity:1,   bouncy:false, desc:'Acerte 3 itens na cesta!',     emoji:'🌿'},
  {hits:4,  tries:6, bw:.15, bh:.11, move:false, mspd:0,   wind:0,    gravity:1,   bouncy:false, desc:'Cesta menor — acerte 4!',       emoji:'🌸'},
  {hits:5,  tries:6, bw:.14, bh:.10, move:true,  mspd:1.2, wind:0,    gravity:1,   bouncy:false, desc:'Cesta em movimento — acerte 5!', emoji:'🍃'},
  {hits:6,  tries:5, bw:.13, bh:.09, move:true,  mspd:1.8, wind:.08,  gravity:1,   bouncy:false, desc:'Vento fraco — acerte 6!',        emoji:'💨'},
  {hits:7,  tries:5, bw:.12, bh:.09, move:true,  mspd:2.4, wind:.14,  gravity:1,   bouncy:false, desc:'Vento forte — acerte 7!',        emoji:'🌬️'},
  {hits:8,  tries:4, bw:.11, bh:.08, move:true,  mspd:3.0, wind:.18,  gravity:1.1, bouncy:false, desc:'Super difícil — acerte 8!',      emoji:'⚡'},
  {hits:9,  tries:4, bw:.10, bh:.08, move:true,  mspd:3.6, wind:.20,  gravity:1.1, bouncy:true,  desc:'Cesta saltitante — acerte 9!',   emoji:'🔥'},
  {hits:10, tries:3, bw:.09, bh:.07, move:true,  mspd:4.2, wind:.24,  gravity:1.2, bouncy:true,  desc:'MODO FINAL — acerte 10!',        emoji:'👑'},
];

/* ══════════════════════════
   IMAGE LOADER
══════════════════════════ */
function loadImg(src){ const i=new Image(); i.ok=false; i.onload=()=>i.ok=true; i.src=src; return i; }
const itemImgs=['item1.png','item2.png','item3.png','item4.png','item5.png','item6.png'].map(loadImg);
const avatarImg=loadImg('avancou.png');

/* ══════════════════════════
   STATE
══════════════════════════ */
let phase=0; // 0-indexed
let hitsNeeded, triesLeft, hitsGot;
let cfg; // current phase config
const ST={IDLE:0,DRAGGING:1,FLYING:2,SCORED:3,FAILED:4};
let gState=ST.IDLE;

/* ══════════════════════════
   SLINGSHOT
══════════════════════════ */
let sling={x:0,y:0,r:28}; // anchor point of slingshot pocket

/* ══════════════════════════
   BASKET
══════════════════════════ */
let basket={x:0,y:0,w:0,h:0,vx:1,bounceT:0};

/* ══════════════════════════
   PROJECTILE
══════════════════════════ */
let proj={x:0,y:0,vx:0,vy:0,r:22,active:false,imgIdx:0,rot:0,trail:[]};

/* ══════════════════════════
   DRAG
══════════════════════════ */
let drag={active:false,sx:0,sy:0}; // touch/mouse drag start

/* ══════════════════════════
   PARTICLES
══════════════════════════ */
let particles=[];
function spawnParticles(x,y){
  const cols=['#ffe066','#ff6b9d','#4dffd2','#c44dff','#ff7043'];
  for(let i=0;i<20;i++) particles.push({x,y,vx:(Math.random()-.5)*12,vy:(Math.random()-.5)*12-4,r:3+Math.random()*8,color:cols[Math.floor(Math.random()*cols.length)],life:1});
}

/* ══════════════════════════
   INIT SCENE
══════════════════════════ */
function initScene(){
  cfg=PHASES[phase];
  // slingshot: left third, vertically centered a bit above middle
  sling.x=C.width*.22;
  sling.y=C.height*.62;
  // basket: right side
  basket.w=C.width*cfg.bw;
  basket.h=C.height*cfg.bh;
  basket.x=C.width*.72-basket.w/2;
  basket.y=C.height*.55-basket.h;
  basket.vx=cfg.mspd;
  basket.bounceT=0;
  resetProjectile();
}

function resetProjectile(){
  proj.x=sling.x;
  proj.y=sling.y;
  proj.vx=0; proj.vy=0;
  proj.active=false;
  proj.rot=0;
  proj.trail=[];
  proj.imgIdx=Math.floor(Math.random()*itemImgs.length);
  gState=ST.IDLE;
}

/* ══════════════════════════
   DRAW FUNCTIONS
══════════════════════════ */
function drawBg(){
  // sky gradient — warm picnic day
  const sky=X.createLinearGradient(0,0,0,C.height*.55);
  sky.addColorStop(0,'#87ceeb'); sky.addColorStop(1,'#c8e8f8');
  X.fillStyle=sky; X.fillRect(0,0,C.width,C.height*.55);

  // clouds
  drawCloud(.15,.12,.9); drawCloud(.55,.08,.7); drawCloud(.8,.15,.85);

  // grass
  const grass=X.createLinearGradient(0,C.height*.53,0,C.height);
  grass.addColorStop(0,'#4ade80'); grass.addColorStop(.3,'#22c55e'); grass.addColorStop(1,'#15803d');
  X.fillStyle=grass; X.fillRect(0,C.height*.53,C.width,C.height*.47);

  // ground line
  X.strokeStyle='#166534'; X.lineWidth=3;
  X.beginPath(); X.moveTo(0,C.height*.55); X.lineTo(C.width,C.height*.55); X.stroke();

  // flowers on ground
  for(let i=0;i<12;i++){
    const fx=C.width*(0.04+i*0.085), fy=C.height*.54;
    X.font='clamp(14px,2.5vw,22px) serif'; X.textAlign='center';
    X.fillText(['🌸','🌼','🌺'][i%3],fx,fy+10);
  }
}

function drawCloud(xf,yf,sc){
  const cx=C.width*xf, cy=C.height*yf, r=C.width*.06*sc;
  X.fillStyle='rgba(255,255,255,.85)';
  X.beginPath(); X.arc(cx,cy,r,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(cx+r*.7,cy+r*.2,r*.7,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(cx-r*.6,cy+r*.2,r*.6,0,Math.PI*2); X.fill();
  X.beginPath(); X.arc(cx+r*.2,cy+r*.3,r*.8,0,Math.PI*2); X.fill();
}

function drawSlingshot(){
  const sx=sling.x, sy=sling.y;
  // trunk
  X.strokeStyle='#92400e'; X.lineWidth=8; X.lineCap='round';
  X.beginPath(); X.moveTo(sx,sy+C.height*.18); X.lineTo(sx,sy-C.height*.04); X.stroke();
  // Y fork
  X.lineWidth=6;
  X.beginPath(); X.moveTo(sx,sy-C.height*.03); X.lineTo(sx-C.width*.04,sy-C.height*.1); X.stroke();
  X.beginPath(); X.moveTo(sx,sy-C.height*.03); X.lineTo(sx+C.width*.04,sy-C.height*.1); X.stroke();

  // fork tips
  const lt={x:sx-C.width*.04, y:sy-C.height*.1};
  const rt={x:sx+C.width*.04, y:sy-C.height*.1};

  if(drag.active && gState===ST.DRAGGING){
    // elastic bands to dragged position
    X.strokeStyle='#78350f'; X.lineWidth=3;
    X.beginPath(); X.moveTo(lt.x,lt.y); X.lineTo(proj.x,proj.y); X.stroke();
    X.beginPath(); X.moveTo(rt.x,rt.y); X.lineTo(proj.x,proj.y); X.stroke();
  } else if(gState===ST.IDLE){
    // bands to resting proj
    X.strokeStyle='#78350f'; X.lineWidth=3;
    X.beginPath(); X.moveTo(lt.x,lt.y); X.lineTo(sling.x,sling.y); X.stroke();
    X.beginPath(); X.moveTo(rt.x,rt.y); X.lineTo(sling.x,sling.y); X.stroke();
  }
}

function drawBasket(){
  const bx=basket.x, by=basket.y, bw=basket.w, bh=basket.h;
  // wicker basket body
  X.fillStyle='#92400e';
  X.beginPath();
  X.moveTo(bx,by);
  X.lineTo(bx+bw,by);
  X.lineTo(bx+bw*1.05,by+bh);
  X.lineTo(bx-bw*.05,by+bh);
  X.closePath(); X.fill();

  // basket pattern
  X.strokeStyle='#78350f'; X.lineWidth=2;
  for(let i=1;i<4;i++){
    const yy=by+bh*(i/4);
    X.beginPath(); X.moveTo(bx,yy); X.lineTo(bx+bw,yy); X.stroke();
  }
  for(let i=1;i<5;i++){
    const xx=bx+bw*(i/5);
    X.beginPath(); X.moveTo(xx,by); X.lineTo(xx+bw*.05,by+bh); X.stroke();
  }

  // rim (opening highlight) — this is where we detect hits
  X.strokeStyle='#fcd34d'; X.lineWidth=4;
  X.beginPath(); X.moveTo(bx-bw*.05,by); X.lineTo(bx+bw*1.05,by); X.stroke();

  // handle
  X.strokeStyle='#92400e'; X.lineWidth=5;
  X.beginPath(); X.arc(bx+bw/2, by-bh*.2, bw*.32, Math.PI, 0); X.stroke();

  // gingham cloth inside top
  X.fillStyle='rgba(254,215,170,.6)';
  X.fillRect(bx,by,bw,bh*.15);

  // wind indicator text
  if(cfg.wind>0){
    const dir=basket.vx>0?'→':'←';
    X.font='bold clamp(11px,2.5vw,16px) "Bubblegum Sans",cursive';
    X.fillStyle='rgba(255,255,255,.7)'; X.textAlign='center';
    X.fillText('🌬️ Vento '+dir, bx+bw/2, by-bh*.45);
  }
}

function drawProjectile(){
  if(proj.trail.length>1){
    X.strokeStyle='rgba(255,220,100,.4)'; X.lineWidth=2; X.lineCap='round';
    X.beginPath(); X.moveTo(proj.trail[0].x,proj.trail[0].y);
    proj.trail.forEach(p=>X.lineTo(p.x,p.y)); X.stroke();
  }
  const img=itemImgs[proj.imgIdx];
  X.save(); X.translate(proj.x,proj.y); X.rotate(proj.rot);
  X.shadowColor='#ffe066'; X.shadowBlur=12;
  if(img.ok){ X.drawImage(img,-proj.r,-proj.r,proj.r*2,proj.r*2); }
  else { X.fillStyle='#fcd34d'; X.beginPath(); X.arc(0,0,proj.r,0,Math.PI*2); X.fill(); }
  X.shadowBlur=0; X.restore();
}

function drawAimGuide(){
  if(gState!==ST.DRAGGING) return;
  const dx=sling.x-proj.x, dy=sling.y-proj.y;
  const maxPull=C.width*.14;
  const dist=Math.min(Math.sqrt(dx*dx+dy*dy),maxPull);
  const angle=Math.atan2(dy,dx);
  const power=dist/maxPull;
  const vx0=-Math.cos(angle)*power*22;
  const vy0=-Math.sin(angle)*power*22;
  const g=0.55*cfg.gravity;
  // draw dotted trajectory prediction
  X.fillStyle='rgba(255,230,100,.55)';
  let px=proj.x, py=proj.y, pvx=vx0, pvy=vy0;
  for(let i=0;i<40;i++){
    px+=pvx; py+=pvy; pvy+=g;
    if(i%3===0){
      const r=4-i*.06; if(r<1) break;
      X.beginPath(); X.arc(px,py,r,0,Math.PI*2); X.fill();
    }
    if(py>C.height*.55) break;
  }
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.life-=.03;
    if(p.life<=0){particles.splice(i,1);continue;}
    X.globalAlpha=p.life;X.fillStyle=p.color;X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function drawPlayerChar(){
  // small character near slingshot
  const px=sling.x-C.width*.1, py=C.height*.53;
  const hr=C.width*.04;
  // body
  X.fillStyle='#ec4899';
  X.beginPath(); X.ellipse(px,py-hr*1.8,hr*.6,hr*1.2,0,0,Math.PI*2); X.fill();
  // head
  X.fillStyle='#fde68a'; X.beginPath(); X.arc(px,py-hr*3.2,hr,0,Math.PI*2); X.fill();
  if(avatarImg.ok){ X.save(); X.beginPath(); X.arc(px,py-hr*3.2,hr,0,Math.PI*2); X.clip(); X.drawImage(avatarImg,px-hr,py-hr*3.2-hr,hr*2,hr*2); X.restore(); }
  // arm pointing at slingshot
  X.strokeStyle='#fca5a5'; X.lineWidth=4; X.lineCap='round';
  X.beginPath(); X.moveTo(px+hr*.5,py-hr*2); X.lineTo(sling.x-C.width*.04,sling.y); X.stroke();
  // legs
  X.fillStyle='#fca5a5'; X.fillRect(px-hr*.35,py-hr*.8,hr*.3,hr*.9); X.fillRect(px+hr*.05,py-hr*.8,hr*.3,hr*.9);
}

/* ══════════════════════════
   BASKET MOVEMENT
══════════════════════════ */
function updateBasket(){
  if(!cfg.move) return;
  basket.x+=basket.vx;
  const minX=C.width*.5, maxX=C.width*.94-basket.w;
  if(basket.x<minX||basket.x>maxX) basket.vx*=-1;
  // bouncy mode
  if(cfg.bouncy){
    basket.bounceT+=0.06;
    basket.y=(C.height*.55-basket.h)+(Math.sin(basket.bounceT)*C.height*.06);
  }
}

/* ══════════════════════════
   COLLISION DETECTION
══════════════════════════ */
function checkBasketHit(){
  // check if proj enters the basket opening (top rim area)
  const rimY=basket.y+basket.h*.1; // slightly inside top
  const rimX1=basket.x-basket.w*.05, rimX2=basket.x+basket.w*1.05;
  const inX=proj.x>=rimX1 && proj.x<=rimX2;
  const inY=proj.y>=basket.y-proj.r && proj.y<=rimY+proj.r*2;
  const movingDown=proj.vy>0;
  return inX && inY && movingDown;
}

/* ══════════════════════════
   UPDATE PHYSICS
══════════════════════════ */
const gravity=0.55;
function updatePhysics(){
  if(gState!==ST.FLYING) return;
  proj.vx+=cfg.wind*(Math.random()-.5)*2; // wind jitter
  proj.vy+=gravity*cfg.gravity;
  proj.x+=proj.vx;
  proj.y+=proj.vy;
  proj.rot+=proj.vx*.04;

  proj.trail.push({x:proj.x,y:proj.y});
  if(proj.trail.length>18) proj.trail.shift();

  if(checkBasketHit()){
    hitsGot++;
    spawnParticles(proj.x,proj.y);
    updateHudDisplay();
    if(hitsGot>=hitsNeeded){
      setTimeout(()=>showWinPhase(),400);
    } else {
      setTimeout(()=>{
        triesLeft--;
        if(triesLeft<=0 && hitsGot<hitsNeeded){ showFail(); return; }
        resetProjectile(); updateHudDisplay();
      },500);
    }
    gState=ST.SCORED;
    return;
  }

  // missed: hit ground or exit
  if(proj.y>C.height*.58 || proj.x>C.width+50 || proj.x<-50){
    triesLeft--;
    updateHudDisplay();
    setTimeout(()=>{
      if(triesLeft<=0){ showFail(); return; }
      resetProjectile();
    },300);
    gState=ST.FAILED;
  }
}

/* ══════════════════════════
   HUD
══════════════════════════ */
function updateHudDisplay(){
  document.getElementById('hud-phase').textContent='Fase '+(phase+1)+'/8';
  document.getElementById('hud-hits').textContent='🎯 '+hitsGot+'/'+hitsNeeded;
  document.getElementById('hud-tries').textContent='🍕'.repeat(Math.max(0,triesLeft))+'⬛'.repeat(Math.max(0,cfg.tries-triesLeft));
  const windEl=document.getElementById('hud-wind');
  if(cfg.wind>0){ windEl.style.display='block'; windEl.textContent='🌬️ Vento: '+Math.round(cfg.wind*100)+'%'; }
  else windEl.style.display='none';
}

/* ══════════════════════════
   MAIN LOOP
══════════════════════════ */
function loop(){
  X.clearRect(0,0,C.width,C.height);
  drawBg();
  drawSlingshot();
  drawBasket();
  updateBasket();
  drawAimGuide();
  drawProjectile();
  drawPlayerChar();
  drawParticles();
  updatePhysics();
  requestAnimationFrame(loop);
}

/* ══════════════════════════
   DRAG / TOUCH INPUT
══════════════════════════ */
const MAX_PULL=()=>C.width*.14;

function getPos(e){
  const r=C.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left,y:t.clientY-r.top};
}

function onDown(e){
  if(gState!==ST.IDLE) return;
  const pos=getPos(e);
  const dx=pos.x-sling.x, dy=pos.y-sling.y;
  if(Math.sqrt(dx*dx+dy*dy)<C.width*.15){
    drag.active=true; gState=ST.DRAGGING;
    document.getElementById('drag-hint').classList.add('hidden');
    e.preventDefault();
  }
}
function onMove(e){
  if(!drag.active||gState!==ST.DRAGGING) return;
  const pos=getPos(e);
  const dx=pos.x-sling.x, dy=pos.y-sling.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const clamp=Math.min(dist,MAX_PULL());
  const angle=Math.atan2(dy,dx);
  proj.x=sling.x+Math.cos(angle)*clamp;
  proj.y=sling.y+Math.sin(angle)*clamp;
  e.preventDefault();
}
function onUp(e){
  if(!drag.active||gState!==ST.DRAGGING) return;
  drag.active=false;
  const dx=sling.x-proj.x, dy=sling.y-proj.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<C.width*.02){ resetProjectile(); return; } // too short — cancel
  const angle=Math.atan2(dy,dx);
  const power=dist/MAX_PULL();
  proj.vx=Math.cos(angle)*power*22;
  proj.vy=Math.sin(angle)*power*22;
  proj.active=true;
  gState=ST.FLYING;
  e.preventDefault&&e.preventDefault();
}

C.addEventListener('mousedown',onDown);
C.addEventListener('mousemove',onMove);
C.addEventListener('mouseup',onUp);
C.addEventListener('touchstart',onDown,{passive:false});
C.addEventListener('touchmove',onMove,{passive:false});
C.addEventListener('touchend',onUp,{passive:false});

/* ══════════════════════════
   PHASE FLOW
══════════════════════════ */
function showPhaseIntro(){
  cfg=PHASES[phase];
  document.getElementById('p-emoji').textContent=cfg.emoji;
  document.getElementById('p-title').textContent='Fase '+(phase+1)+' de 8';
  document.getElementById('p-sub').textContent=cfg.desc;
  document.getElementById('p-info').textContent='Acerte '+cfg.hits+' itens • '+cfg.tries+' arremessos'+(cfg.wind>0?' • 🌬️ Vento':'')+(cfg.move?' • 🔀 Cesta se move':'');
  ['screen-phase','screen-win-phase','screen-fail','screen-gameclear'].forEach(s=>document.getElementById(s).classList.remove('hidden'));
  ['screen-win-phase','screen-fail','screen-gameclear'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById('hud').style.display='none';
  document.getElementById('hud-wind').style.display='none';
  document.getElementById('drag-hint').classList.remove('hidden');
}

function startPhase(){
  cfg=PHASES[phase];
  hitsNeeded=cfg.hits; triesLeft=cfg.tries; hitsGot=0;
  initScene();
  document.getElementById('screen-phase').classList.add('hidden');
  document.getElementById('hud').style.display='flex';
  updateHudDisplay();
  document.getElementById('drag-hint').classList.remove('hidden');
  document.getElementById('game-music').play().catch(()=>{});
}

function showWinPhase(){
  document.getElementById('hud').style.display='none';
  document.getElementById('wp-msg').textContent=phase<7?'Fase '+(phase+1)+' concluída! Prepare-se...':'Você é demais, Manu! 🌟';
  ['screen-win-phase'].forEach(s=>document.getElementById(s).classList.remove('hidden'));
}

function showFail(){
  document.getElementById('hud').style.display='none';
  document.getElementById('fail-msg').textContent='Acertou '+hitsGot+' de '+hitsNeeded+'. Tente de novo!';
  document.getElementById('screen-fail').classList.remove('hidden');
}

function nextPhase(){
  document.getElementById('screen-win-phase').classList.add('hidden');
  phase++;
  if(phase>=PHASES.length){
    document.getElementById('screen-gameclear').classList.remove('hidden');
    return;
  }
  showPhaseIntro();
}

function retryPhase(){
  document.getElementById('screen-fail').classList.add('hidden');
  showPhaseIntro();
}

function playAgain(){
  phase=0;
  document.getElementById('screen-gameclear').classList.add('hidden');
  showPhaseIntro();
}

/* ══════════════════════════
   BUTTON WIRING
══════════════════════════ */
document.getElementById('btn-start-phase').addEventListener('click',startPhase);
document.getElementById('btn-next-phase').addEventListener('click',nextPhase);
document.getElementById('btn-retry').addEventListener('click',retryPhase);
document.getElementById('btn-play-again').addEventListener('click',playAgain);

/* ══════════════════════════
   BOOT
══════════════════════════ */
showPhaseIntro();
loop();
</script>
