<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎉 Parabéns Chiquita!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bubblegum+Sans&family=Nunito:wght@400;700;900&display=swap');

:root {
  --pink:#ff6b9d; --purple:#c44dff; --yellow:#ffe066;
  --mint:#4dffd2; --bg:#0e0220;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;
  background:var(--bg);touch-action:manipulation;user-select:none;}
canvas{display:block;position:fixed;top:0;left:0;z-index:0;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:10;
  transition:opacity .35s ease;}
.screen.hidden{opacity:0;pointer-events:none;}

/* ── START ── */
#screen-start{background:transparent;}
#bg-slideshow{position:absolute;inset:0;z-index:0;overflow:hidden;}
.bg-slide{position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity 1.3s ease;}
.bg-slide.active{opacity:1;}
#start-overlay{position:absolute;inset:0;z-index:1;
  background:linear-gradient(155deg,rgba(14,2,32,.85) 0%,rgba(60,10,100,.78) 55%,rgba(196,77,255,.22) 100%);}
#star-canvas{position:absolute;inset:0;z-index:1;pointer-events:none;}
#start-content{position:relative;z-index:2;display:flex;flex-direction:column;
  align-items:center;gap:12px;padding:24px;text-align:center;}

.top-emoji{font-size:clamp(2rem,7vw,3.8rem);animation:floaty 2s ease-in-out infinite alternate;}
@keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-14px)}}

#start-title{font-family:'Fredoka One',cursive;font-size:clamp(2.8rem,9.5vw,6rem);
  line-height:1.05;color:#fff;
  text-shadow:0 0 24px var(--pink),0 0 60px var(--purple),0 5px 0 #7a1ca0;
  animation:titlePop 2.4s ease-in-out infinite alternate;}
@keyframes titlePop{
  from{transform:scale(1) rotate(-.4deg);text-shadow:0 0 20px var(--pink),0 0 40px var(--purple),0 5px 0 #7a1ca0;}
  to{transform:scale(1.05) rotate(.4deg);text-shadow:0 0 45px #ff9de2,0 0 90px #d966ff,0 5px 0 #4a0d7a;}}

#start-sub{font-family:'Bubblegum Sans',cursive;font-size:clamp(1rem,3.5vw,1.55rem);
  color:var(--yellow);letter-spacing:3px;
  text-shadow:0 2px 8px rgba(0,0,0,.5);animation:fadePulse 3s ease-in-out infinite;}
@keyframes fadePulse{0%,100%{opacity:.7}50%{opacity:1}}

#btn-start{margin-top:10px;padding:18px 56px;font-family:'Fredoka One',cursive;
  font-size:clamp(1.3rem,4.5vw,2rem);color:#1a0535;
  background:linear-gradient(135deg,var(--yellow),#ffb347);
  border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;
  box-shadow:0 0 30px #ffe06688,0 6px 0 #b8860b;
  animation:btnGlow 1.5s ease-in-out infinite alternate;
  transition:transform .1s,box-shadow .1s;}
@keyframes btnGlow{
  from{box-shadow:0 0 20px #ffe06688,0 6px 0 #b8860b;}
  to{box-shadow:0 0 60px #ffe066cc,0 6px 0 #8b6500;}}
#btn-start:active{transform:translateY(4px);box-shadow:0 0 20px #ffe06688,0 2px 0 #b8860b;}
.start-hint{font-size:.82rem;color:#c4b5fd;opacity:.78;margin-top:2px;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;
  justify-content:space-between;align-items:center;
  padding:10px 18px;
  background:linear-gradient(180deg,rgba(0,0,0,.75) 0%,transparent 100%);
  z-index:10;pointer-events:none;}
#hud-score{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,4vw,1.8rem);
  color:#fff;text-shadow:0 0 12px var(--yellow);}
#hud-lives{font-size:clamp(1rem,3.5vw,1.5rem);letter-spacing:2px;}
#hud-level{font-family:'Fredoka One',cursive;font-size:clamp(.8rem,2.5vw,1.1rem);
  color:#e9d5ff;background:rgba(168,85,247,.35);
  padding:4px 14px;border-radius:20px;border:1px solid rgba(196,77,255,.4);}

/* ── CONTROLS ── */
#controls{position:fixed;bottom:18px;left:0;right:0;
  display:flex;justify-content:center;gap:44px;z-index:10;}
.ctrl{width:78px;height:78px;border-radius:50%;
  background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;font-size:2rem;
  cursor:pointer;backdrop-filter:blur(4px);
  box-shadow:0 0 20px rgba(196,77,255,.4);transition:background .1s;}
.ctrl:active,.ctrl.pressed{background:rgba(255,107,157,.5);}

/* ── OVERLAY SCREENS ── */
#screen-gameover,#screen-win{
  background:rgba(10,2,28,.9);backdrop-filter:blur(10px);z-index:20;gap:18px;}

.over-emoji{font-size:clamp(3.5rem,11vw,6rem);
  animation:sadRock 1.3s ease-in-out infinite alternate;}
@keyframes sadRock{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}

.over-title{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,8vw,4.5rem);
  color:var(--pink);text-shadow:0 0 35px var(--pink);text-align:center;}
.over-info{font-family:'Bubblegum Sans',cursive;font-size:clamp(1rem,3.5vw,1.6rem);
  color:var(--yellow);text-align:center;}

.win-emoji{font-size:clamp(3rem,10vw,5.5rem);animation:floaty 1.5s ease-in-out infinite alternate;}
.win-title{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,9vw,5.5rem);
  color:var(--yellow);text-shadow:0 0 45px var(--yellow),0 0 90px #ffb347;
  text-align:center;animation:winPop 1.6s ease-in-out infinite alternate;}
@keyframes winPop{from{transform:scale(1)}to{transform:scale(1.07)}}
.win-sub{font-family:'Bubblegum Sans',cursive;font-size:clamp(1rem,3.5vw,1.5rem);
  color:#fff;text-align:center;line-height:1.6;}

.btn-retry{padding:16px 46px;font-family:'Fredoka One',cursive;
  font-size:clamp(1.2rem,4vw,1.7rem);color:#fff;border:none;border-radius:50px;
  cursor:pointer;letter-spacing:1px;box-shadow:0 6px 0 rgba(0,0,0,.4);
  transition:transform .1s,box-shadow .1s;}
.btn-retry:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
#btn-retry-go{background:linear-gradient(135deg,var(--pink),#c2185b);}
#btn-retry-win{background:linear-gradient(135deg,var(--mint),#00bfa5);color:#052e25;}

.over-hint{font-size:.85rem;color:#c4b5fd;opacity:.8;}

/* ── FLASH ── */
#flash,#err-flash{position:fixed;inset:0;pointer-events:none;z-index:15;opacity:0;transition:opacity .07s;}
#flash{background:rgba(255,255,200,.22);}
#err-flash{background:rgba(255,40,40,.3);}

/* ── CONFETTI ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:19;}
</style>
</head>
<body>

<canvas id="game-canvas"></canvas>
<canvas id="confetti-canvas" style="display:none"></canvas>

<!-- START -->
<div id="screen-start" class="screen">
  <canvas id="star-canvas"></canvas>
  <div id="bg-slideshow"></div>
  <div id="start-overlay"></div>
  <div id="start-content">
    <div class="top-emoji">🎂🎉🎈</div>
    <div id="start-title">PARABÉNS<br>CHIQUITA!</div>
    <div id="start-sub">🧀 COLETA OS PÃES DE QUEIJO 🧀</div>
    <button id="btn-start">▶ PRESS START</button>
    <div class="start-hint">Use ← → ou os botões • R para reiniciar</div>
  </div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="hud-score">🧀 <span id="sc">0</span>/<span id="sc-max">50</span></div>
  <div id="hud-lives">❤️❤️❤️</div>
  <div id="hud-level">Nível <span id="lv">1</span></div>
</div>

<!-- CONTROLS -->
<div id="controls" style="display:none">
  <div class="ctrl" id="btn-left">⬅</div>
  <div class="ctrl" id="btn-right">➡</div>
</div>

<!-- GAME OVER -->
<div id="screen-gameover" class="screen hidden">
  <div class="over-emoji">😢</div>
  <div class="over-title">GAME OVER!</div>
  <div class="over-info" id="go-score-txt">Você coletou 0 pães!</div>
  <button class="btn-retry" id="btn-retry-go">🔁 TENTE NOVAMENTE</button>
  <div class="over-hint">ou pressione R</div>
</div>

<!-- WIN -->
<div id="screen-win" class="screen hidden">
  <div class="win-emoji">🏆</div>
  <div class="win-title">PARABÉNS<br>CHIQUITA! 🎉</div>
  <div class="win-sub">Você coletou todos os pães de queijo!<br>Você é incrível! 💕</div>
  <button class="btn-retry" id="btn-retry-win">🎮 JOGAR DE NOVO</button>
</div>

<!-- FLASHES -->
<div id="flash"></div>
<div id="err-flash"></div>

<!-- AUDIO -->
<audio id="menu-music" loop><source src="menu_music.mp3" type="audio/mpeg"></audio>
<audio id="game-music" loop><source src="game_music.mp3" type="audio/mpeg"></audio>

<script>
'use strict';

/* ═══════════════════════════════════
   CONFIG
════════════════════════════════════ */
const WIN_SCORE   = 50;
const MAX_LIVES   = 3;
const BG_SRCS     = ['bg1.jpg','bg2.jpg','bg3.jpg','bg4.jpg','bg5.jpg'];
const ITEM_SRCS   = ['item1.png','item2.png'];

/* ═══════════════════════════════════
   STATE
════════════════════════════════════ */
const ST = {START:0,PLAYING:1,GAMEOVER:2,WIN:3};
let gameState = ST.START;

/* ═══════════════════════════════════
   CANVAS
════════════════════════════════════ */
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize',()=>{ resize(); initRoad(); initRain(); });

/* ═══════════════════════════════════
   ASSETS
════════════════════════════════════ */
const avatarImg = new Image(); avatarImg.src='avatar.png';
let avatarOK=false; avatarImg.onload=()=>avatarOK=true;

const itemImgs = ITEM_SRCS.map(src=>{
  const img=new Image(); img.src=src; img.ok=false;
  img.onload=()=>img.ok=true; return img;
});

/* ═══════════════════════════════════
   BG SLIDESHOW
════════════════════════════════════ */
(function(){
  const cont=document.getElementById('bg-slideshow');
  const slides=BG_SRCS.map((src,i)=>{
    const d=document.createElement('div');
    d.className='bg-slide'+(i===0?' active':'');
    d.style.backgroundImage=`url('${src}')`;
    cont.appendChild(d); return d;
  });
  let cur=0;
  setInterval(()=>{
    slides[cur].classList.remove('active');
    cur=(cur+1)%slides.length;
    slides[cur].classList.add('active');
  },3600);
})();

/* ═══════════════════════════════════
   STAR CANVAS (start bg)
════════════════════════════════════ */
(function(){
  const sc=document.getElementById('star-canvas');
  const sx=sc.getContext('2d');
  function rs(){sc.width=window.innerWidth;sc.height=window.innerHeight;}
  rs(); window.addEventListener('resize',rs);
  const stars=Array.from({length:90},()=>({
    x:Math.random(),y:Math.random(),
    r:.5+Math.random()*2,
    a:Math.random(),da:(.002+Math.random()*.005)*(Math.random()>.5?1:-1)
  }));
  function draw(){
    sx.clearRect(0,0,sc.width,sc.height);
    stars.forEach(s=>{
      s.a=Math.abs((s.a+s.da+1)%2-1);
      sx.globalAlpha=s.a*.9; sx.fillStyle='#fff';
      sx.beginPath(); sx.arc(s.x*sc.width,s.y*sc.height,s.r,0,Math.PI*2); sx.fill();
    });
    sx.globalAlpha=1;
    if(gameState===ST.START) requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════════════════
   AUDIO
════════════════════════════════════ */
const menuMus=document.getElementById('menu-music');
const gameMus=document.getElementById('game-music');
function playMenu(){ gameMus.pause(); gameMus.currentTime=0; menuMus.play().catch(()=>{}); }
function playGame(){ menuMus.pause(); menuMus.currentTime=0; gameMus.play().catch(()=>{}); }
function stopAll(){ menuMus.pause(); gameMus.pause(); }

/* ═══════════════════════════════════
   GAME VARS
════════════════════════════════════ */
let score=0, lives=MAX_LIVES, level=1;
let running=false, animId=null;
let items=[], particles=[], popups=[], spawnTimer=0;

/* ═══════════════════════════════════
   ROAD
════════════════════════════════════ */
let stripes=[], trees=[], rain=[];
function roadL(){ return canvas.width*.2; }
function roadR(){ return canvas.width*.8; }
function roadW(){ return roadR()-roadL(); }

function initRoad(){
  stripes=Array.from({length:22},(_,i)=>i*(canvas.height/11));
  trees=Array.from({length:12},(_,i)=>({
    y:(i/12)*canvas.height,side:i%2===0?'L':'R',
    sz:20+Math.random()*24,
    col:['#4a1d96','#7e22ce','#6b21a8'][i%3]
  }));
}
function initRain(){
  rain=Array.from({length:28},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    s:14+Math.random()*14,
    v:1.4+Math.random()*2,
    a:.1+Math.random()*.18
  }));
}
initRoad(); initRain();

/* ═══════════════════════════════════
   PLAYER
════════════════════════════════════ */
const P={w:68,h:108,_x:0,y:0,spd:7,
  get x(){return this._x;},
  set x(v){this._x=Math.max(roadL()+8,Math.min(roadR()-this.w-8,v));}
};

/* ═══════════════════════════════════
   SPEED / LEVEL
════════════════════════════════════ */
function rSpeed(){ return Math.min(3.5+(level-1)*.65,13); }
function iSpeed(){ return rSpeed()+2; }
function spawnInt(){ return Math.max(20,56-(level-1)*4); }
function calcLv(s){
  const t=[0,8,18,30,42,50];
  for(let i=t.length-1;i>=0;i--) if(s>=t[i]) return Math.min(i+1,10);
  return 1;
}

/* ═══════════════════════════════════
   INPUT
════════════════════════════════════ */
let gL=false,gR=false;
function mkTouch(el,fn){
  el.addEventListener('touchstart',e=>{e.preventDefault();fn(true);el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();fn(false);el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown', ()=>{fn(true);el.classList.add('pressed');});
  el.addEventListener('mouseup',   ()=>{fn(false);el.classList.remove('pressed');});
  el.addEventListener('mouseleave',()=>{fn(false);el.classList.remove('pressed');});
}
mkTouch(document.getElementById('btn-left'), v=>gL=v);
mkTouch(document.getElementById('btn-right'),v=>gR=v);

window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a') gL=true;
  if(e.key==='ArrowRight'||e.key==='d') gR=true;
  if(e.key==='r'||e.key==='R') fullRestart();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a') gL=false;
  if(e.key==='ArrowRight'||e.key==='d') gR=false;
});

/* ═══════════════════════════════════
   SCREEN HELPERS
════════════════════════════════════ */
const SCREEN_IDS=['screen-start','screen-gameover','screen-win'];
function showScreen(id){
  SCREEN_IDS.forEach(s=>{
    const el=document.getElementById(s);
    el.id===id?el.classList.remove('hidden'):el.classList.add('hidden');
  });
}
function hideAll(){ SCREEN_IDS.forEach(s=>document.getElementById(s).classList.add('hidden')); }

/* ═══════════════════════════════════
   FLASH
════════════════════════════════════ */
function flashGood(){ const f=document.getElementById('flash'); f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',75); }
function flashBad(){  const f=document.getElementById('err-flash'); f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',120); }

/* ═══════════════════════════════════
   CONFETTI
════════════════════════════════════ */
const confC=document.getElementById('confetti-canvas');
const confX=confC.getContext('2d');
let confPieces=[], confAnim=null;
const CONF_COLS=['#ff6b9d','#ffe066','#4dffd2','#c44dff','#ff7043','#60a5fa'];

function startConfetti(){
  confC.style.display='block';
  confC.width=window.innerWidth; confC.height=window.innerHeight;
  confPieces=Array.from({length:130},()=>({
    x:Math.random()*confC.width,
    y:-20-Math.random()*confC.height*.5,
    vx:(Math.random()-.5)*4,
    vy:2+Math.random()*4,
    w:7+Math.random()*10, h:5+Math.random()*7,
    rot:Math.random()*360, drot:(Math.random()-.5)*8,
    color:CONF_COLS[Math.floor(Math.random()*CONF_COLS.length)]
  }));
  function draw(){
    confX.clearRect(0,0,confC.width,confC.height);
    confPieces.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.drot;
      if(p.y>confC.height+20){p.y=-20;p.x=Math.random()*confC.width;}
      confX.save(); confX.translate(p.x,p.y); confX.rotate(p.rot*Math.PI/180);
      confX.fillStyle=p.color; confX.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      confX.restore();
    });
    confAnim=requestAnimationFrame(draw);
  }
  if(confAnim) cancelAnimationFrame(confAnim);
  draw();
}
function stopConfetti(){
  if(confAnim) cancelAnimationFrame(confAnim);
  confC.style.display='none';
  confX.clearRect(0,0,confC.width,confC.height);
}

/* ═══════════════════════════════════
   PARTICLES & POPUPS
════════════════════════════════════ */
function spawnPart(x,y){
  const cols=['#ff6b9d','#ffe066','#4dffd2','#c44dff','#ff7043'];
  for(let i=0;i<16;i++) particles.push({
    x,y,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10-3,
    r:3+Math.random()*7,color:cols[Math.floor(Math.random()*cols.length)],life:1
  });
}
function spawnPop(x,y,txt){ popups.push({x,y,txt,life:1}); }

/* ═══════════════════════════════════
   HUD UPDATE
════════════════════════════════════ */
function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('sc-max').textContent=WIN_SCORE;
  document.getElementById('lv').textContent=level;
  const hearts='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,MAX_LIVES-lives));
  document.getElementById('hud-lives').textContent=hearts;
}

/* ═══════════════════════════════════
   DRAW: ROAD
════════════════════════════════════ */
function drawRoad(){
  const rs=rSpeed();
  const rl=roadL(),rr=roadR(),rw=roadW();
  const W=canvas.width,H=canvas.height;

  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H*.36);
  sky.addColorStop(0,'#04000e'); sky.addColorStop(1,'#1a0838');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.36);

  // Ground sides
  const gnd=ctx.createLinearGradient(0,H*.3,0,H);
  gnd.addColorStop(0,'#170530'); gnd.addColorStop(1,'#280a50');
  ctx.fillStyle=gnd;
  ctx.fillRect(0,H*.36,rl,H*.64);
  ctx.fillRect(rr,H*.36,W-rr,H*.64);

  // Road
  const rdg=ctx.createLinearGradient(rl,0,rr,0);
  rdg.addColorStop(0,'#14092a'); rdg.addColorStop(.5,'#221540'); rdg.addColorStop(1,'#14092a');
  ctx.fillStyle=rdg; ctx.fillRect(rl,0,rw,H);

  // Neon edge glow
  ctx.shadowColor='#c44dff'; ctx.shadowBlur=18;
  ctx.strokeStyle='#a855f7'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(rl,0); ctx.lineTo(rl,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rr,0); ctx.lineTo(rr,H); ctx.stroke();
  ctx.shadowBlur=0;

  // Center dash
  ctx.strokeStyle='#ffffff1a'; ctx.lineWidth=5;
  ctx.setLineDash([30,22]);
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  // Lane markers
  stripes.forEach((sy,i)=>{
    stripes[i]=(sy+rs)%H;
    ctx.fillStyle='#ffffff12';
    ctx.fillRect(rl+rw*.25-7,stripes[i],14,20);
    ctx.fillRect(rl+rw*.75-7,stripes[i],14,20);
  });

  // Roadside trees
  trees.forEach(t=>{
    t.y=(t.y+rs);
    if(t.y>H+60){t.y=-60;t.sz=20+Math.random()*24;t.col=['#4a1d96','#7e22ce','#6b21a8'][Math.floor(Math.random()*3)];}
    const tx=t.side==='L'?rl*.5:rr+(W-rr)*.5;
    ctx.fillStyle=t.col;
    ctx.beginPath(); ctx.arc(tx,t.y,t.sz,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.14)';
    ctx.beginPath(); ctx.arc(tx-t.sz*.3,t.y-t.sz*.3,t.sz*.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffe066'; ctx.globalAlpha=.7;
    ctx.beginPath(); ctx.arc(tx,t.y-t.sz-5,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });

  // BG bread rain
  rain.forEach(d=>{
    d.y=(d.y+d.v); if(d.y>H+20){d.y=-20;d.x=Math.random()*W;}
    const img=itemImgs[0];
    ctx.globalAlpha=d.a;
    if(img.ok) ctx.drawImage(img,d.x,d.y,d.s,d.s);
    else{ctx.fillStyle='#fcd34d';ctx.beginPath();ctx.arc(d.x+d.s/2,d.y+d.s/2,d.s/2,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  });
}

/* ═══════════════════════════════════
   DRAW: PLAYER
════════════════════════════════════ */
function drawPlayer(){
  const px=P._x,py=P.y,w=P.w,h=P.h,cx=px+w/2;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath();
  if(ctx.ellipse) ctx.ellipse(cx,py+h+5,w/2.8,7,0,0,Math.PI*2);
  else ctx.arc(cx,py+h+5,w/3,0,Math.PI*2);
  ctx.fill();

  // Legs
  ctx.fillStyle='#fca5a5';
  ctx.fillRect(px+w*.28,py+h*.9,w*.16,h*.12);
  ctx.fillRect(px+w*.56,py+h*.9,w*.16,h*.12);
  // Shoes
  ctx.fillStyle='#6d28d9';
  ctx.fillRect(px+w*.24,py+h*.99,w*.22,h*.04);
  ctx.fillRect(px+w*.54,py+h*.99,w*.22,h*.04);

  // Dress
  const dg=ctx.createLinearGradient(px,py+h*.3,px+w,py+h);
  dg.addColorStop(0,'#f9a8d4'); dg.addColorStop(.55,'#ec4899'); dg.addColorStop(1,'#db2777');
  ctx.fillStyle=dg;
  ctx.beginPath();
  ctx.moveTo(px+w*.28,py+h*.32);
  ctx.lineTo(px+w*.72,py+h*.32);
  ctx.lineTo(px+w*.93,py+h*.9);
  ctx.lineTo(px+w*.07,py+h*.9);
  ctx.closePath(); ctx.fill();
  // Shine
  ctx.fillStyle='rgba(255,255,255,.14)';
  ctx.beginPath();
  ctx.moveTo(px+w*.32,py+h*.32); ctx.lineTo(px+w*.5,py+h*.32);
  ctx.lineTo(px+w*.43,py+h*.66); ctx.lineTo(px+w*.28,py+h*.66);
  ctx.closePath(); ctx.fill();
  // Hem frills
  for(let i=0;i<5;i++){
    const fx=px+w*.07+i*(w*.86/4);
    ctx.fillStyle=i%2===0?'#f9a8d4':'#ec4899';
    ctx.beginPath(); ctx.arc(fx+w*.86/8,py+h*.9,w*.09,0,Math.PI*2); ctx.fill();
  }

  // Arms
  ctx.strokeStyle='#fca5a5'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px+w*.25,py+h*.42); ctx.lineTo(px-10,py+h*.63); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px+w*.75,py+h*.42); ctx.lineTo(px+w+10,py+h*.63); ctx.stroke();
  ctx.fillStyle='#fca5a5';
  ctx.beginPath(); ctx.arc(px-10,py+h*.64,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+w+10,py+h*.64,7,0,Math.PI*2); ctx.fill();

  // Neck
  ctx.fillStyle='#fca5a5';
  ctx.fillRect(px+w*.42,py+h*.25,w*.16,h*.1);

  // Head bg
  const hr=w*.39,hx=cx,hy=py+h*.2;
  ctx.fillStyle='#fde68a';
  ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill();

  // Avatar face
  if(avatarOK){
    ctx.save();
    ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.clip();
    ctx.drawImage(avatarImg,hx-hr,hy-hr,hr*2,hr*2);
    ctx.restore();
  } else {
    ctx.fillStyle='#fde68a';
    ctx.beginPath(); ctx.arc(hx,hy,hr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5b21b6';
    ctx.beginPath(); ctx.arc(hx-hr*.28,hy-hr*.08,hr*.13,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hx+hr*.28,hy-hr*.08,hr*.13,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#9d174d'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(hx,hy+hr*.18,hr*.25,0,Math.PI); ctx.stroke();
  }

  // Hair
  ctx.fillStyle='#6d28d9';
  ctx.beginPath(); ctx.ellipse(hx,hy-hr*.28,hr*.92,hr*.62,0,Math.PI,Math.PI*2); ctx.fill();
  // Side strands
  ctx.strokeStyle='#5b21b6'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(hx-hr*.62,hy-hr*.2);
  ctx.quadraticCurveTo(hx-hr*.85,hy+hr*.3,hx-hr*.62,hy+hr*.65); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hx+hr*.62,hy-hr*.2);
  ctx.quadraticCurveTo(hx+hr*.85,hy+hr*.3,hx+hr*.62,hy+hr*.65); ctx.stroke();
  // Bow
  ctx.fillStyle='#f0abfc';
  ctx.beginPath(); ctx.ellipse(hx+hr*.72,hy-hr*.58,12,8,Math.PI/5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hx+hr*.72,hy-hr*.58,12,8,-Math.PI/5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e879f9';
  ctx.beginPath(); ctx.arc(hx+hr*.72,hy-hr*.58,5,0,Math.PI*2); ctx.fill();
}

/* ═══════════════════════════════════
   DRAW: ITEM
════════════════════════════════════ */
function drawItem(it){
  const img=itemImgs[it.imgIdx];
  if(img.ok){
    ctx.shadowColor='#fbbf24'; ctx.shadowBlur=20;
    ctx.drawImage(img,it.x,it.y,it.s,it.s);
    ctx.shadowBlur=0;
  } else {
    ctx.shadowColor='#fbbf24'; ctx.shadowBlur=20;
    const g=ctx.createRadialGradient(it.x+it.s*.4,it.y+it.s*.4,2,it.x+it.s/2,it.y+it.s/2,it.s/2);
    g.addColorStop(0,'#fef9c3'); g.addColorStop(.6,'#fcd34d'); g.addColorStop(1,'#f59e0b');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(it.x+it.s/2,it.y+it.s/2,it.s/2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.font='bold '+(it.s*.55)+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🧀',it.x+it.s/2,it.y+it.s/2);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
}

/* ═══════════════════════════════════
   DRAW: FX
════════════════════════════════════ */
function drawFX(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.32; p.life-=.033;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.font='bold 24px "Fredoka One",cursive';
  ctx.textAlign='center';
  for(let i=popups.length-1;i>=0;i--){
    const p=popups[i];
    p.y-=1.8; p.life-=.024;
    if(p.life<=0){popups.splice(i,1);continue;}
    ctx.globalAlpha=p.life;
    ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=3;
    ctx.strokeText(p.txt,p.x,p.y);
    ctx.fillStyle='#ffe066'; ctx.fillText(p.txt,p.x,p.y);
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}

/* ═══════════════════════════════════
   COLLISION
════════════════════════════════════ */
function hit(it){
  const px=P._x,py=P.y,pw=P.w,ph=P.h;
  return(
    it.x+it.s*.2<px+pw*.88&&it.x+it.s*.8>px+pw*.12&&
    it.y+it.s*.2<py+ph   &&it.y+it.s*.8>py+ph*.3
  );
}

/* ═══════════════════════════════════
   UPDATE
════════════════════════════════════ */
function update(){
  if(gL) P.x=P._x-P.spd;
  if(gR) P.x=P._x+P.spd;

  spawnTimer++;
  if(spawnTimer>=spawnInt()){
    const rl=roadL(),sz=36+Math.random()*22;
    const x=rl+14+Math.random()*(roadW()-sz-28);
    items.push({x,y:-sz-10,s:sz,v:iSpeed(),imgIdx:Math.floor(Math.random()*itemImgs.length)});
    spawnTimer=0;
  }

  for(let i=items.length-1;i>=0;i--){
    const it=items[i];
    it.y+=it.v;

    if(hit(it)){
      items.splice(i,1);
      score++;
      level=calcLv(score);
      updateHUD();
      spawnPart(it.x+it.s/2,it.y+it.s/2);
      spawnPop(it.x+it.s/2,it.y,'+1 🧀');
      flashGood();
      if(score>=WIN_SCORE){triggerWin();return;}
      continue;
    }

    if(it.y>canvas.height+10){
      items.splice(i,1);
      lives--; updateHUD(); flashBad();
      if(lives<=0){triggerGameOver();return;}
    }
  }
}

/* ═══════════════════════════════════
   LOOP
════════════════════════════════════ */
function loop(){
  if(!running) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRoad();
  items.forEach(drawItem);
  drawPlayer();
  drawFX();
  update();
  animId=requestAnimationFrame(loop);
}

/* ═══════════════════════════════════
   IDLE LOOP (start screen)
════════════════════════════════════ */
function idleLoop(){
  if(gameState!==ST.START) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawRoad();
  requestAnimationFrame(idleLoop);
}
idleLoop();

/* ═══════════════════════════════════
   STATE TRANSITIONS
════════════════════════════════════ */
function startGame(){
  score=0; lives=MAX_LIVES; level=1;
  items=[]; particles=[]; popups=[]; spawnTimer=0;
  P._x=canvas.width/2-P.w/2;
  P.y=canvas.height-P.h-80;
  initRoad(); initRain();
  updateHUD();
  document.getElementById('hud').style.display='flex';
  document.getElementById('controls').style.display='flex';
  hideAll(); stopConfetti();
  running=true; gameState=ST.PLAYING;
  if(animId) cancelAnimationFrame(animId);
  loop();
  playGame();
}

function triggerGameOver(){
  running=false; gameState=ST.GAMEOVER; stopAll();
  document.getElementById('go-score-txt').textContent=
    `Você coletou ${score} pão${score!==1?'es':''} de queijo!`;
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';
  showScreen('screen-gameover');
}

function triggerWin(){
  running=false; gameState=ST.WIN; stopAll();
  document.getElementById('hud').style.display='none';
  document.getElementById('controls').style.display='none';
  showScreen('screen-win');
  startConfetti();
}

function fullRestart(){
  if(gameState===ST.START) return;
  stopConfetti(); startGame();
}

/* ═══════════════════════════════════
   BUTTONS
════════════════════════════════════ */
document.getElementById('btn-start').addEventListener('click',()=>{
  playMenu();
  setTimeout(startGame,750);
});
document.getElementById('btn-retry-go').addEventListener('click',startGame);
document.getElementById('btn-retry-win').addEventListener('click',()=>{ stopConfetti(); startGame(); });
</script>
