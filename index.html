<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabéns Chiquita</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#ffd1dc}
#startScreen{
position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;background:#ffb6c1;z-index:10}
h1{font-size:42px;animation:pulse 1s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
button{padding:15px 30px;font-size:20px;cursor:pointer;border:none;border-radius:10px}
canvas{display:block;margin:0 auto;background:#87ceeb}
</style>
</head>
<body>

<div id="startScreen">
<h1>PARABÉNS CHIQUITA 🎉</h1>
<button onclick="startGame()">PRESS START</button>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>
<audio id="music" src="musica.mp3" loop></audio>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

let player={x:175,y:480,width:50,height:80,speed:6,img:new Image()};
player.img.src="foto1.png";

let itemImg=new Image();
itemImg.src="foto2.png";

let items=[],score=0,missed=0,maxMissed=5,gameSpeed=3,gameOver=false;
let rain=[];

function initRain(){
 for(let i=0;i<20;i++){
   rain.push({x:Math.random()*400,y:Math.random()*600});
 }
}

function startGame(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("music").play();
 initRain();
 gameLoop();
}

function drawPlayer(){
 ctx.fillStyle="#ff69b4";
 ctx.fillRect(player.x+10,player.y+30,30,40);

 ctx.save();
 ctx.beginPath();
 ctx.arc(player.x+25,player.y+20,20,0,Math.PI*2);
 ctx.clip();
 ctx.drawImage(player.img,player.x+5,player.y,40,40);
 ctx.restore();
}

function spawnItem(){
 items.push({x:Math.random()*(canvas.width-40),y:-40});
}

function drawItems(){
 for(let i=items.length-1;i>=0;i--){
   let it=items[i];
   it.y+=gameSpeed;

   ctx.drawImage(itemImg,it.x,it.y,40,40);

   if(it.x<player.x+50 && it.x+40>player.x && it.y<player.y+80 && it.y+40>player.y){
     items.splice(i,1);
     score++;
     gameSpeed+=0.15;
     continue;
   }

   if(it.y>canvas.height){
     items.splice(i,1);
     missed++;
     if(missed>=maxMissed) gameOver=true;
   }
 }
}

function drawBackground(){
 ctx.fillStyle="#87ceeb";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 rain.forEach(r=>{
   r.y+=2;
   if(r.y>600) r.y=-30;
   ctx.drawImage(itemImg,r.x,r.y,25,25);
 });
}

function drawHUD(){
 ctx.fillStyle="#000";
 ctx.font="16px Arial";
 ctx.fillText("Pontos: "+score,10,20);
 ctx.fillText("Erros: "+missed,10,40);
}

function drawGameOver(){
 ctx.fillStyle="rgba(0,0,0,0.7)";
 ctx.fillRect(0,0,400,600);

 ctx.fillStyle="#fff";
 ctx.font="30px Arial";
 ctx.textAlign="center";
 ctx.fillText("GAME OVER",200,280);

 ctx.font="16px Arial";
 ctx.fillText("Pressione R para reiniciar",200,320);
}

function resetGame(){
 items=[];score=0;missed=0;gameSpeed=3;gameOver=false;
}

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") player.x-=player.speed;
 if(e.key==="ArrowRight") player.x+=player.speed;

 // limites
 if(player.x<0) player.x=0;
 if(player.x>350) player.x=350;

 if(e.key==="r" && gameOver) resetGame();
});

setInterval(spawnItem,900);

function gameLoop(){
 if(gameOver){
   drawGameOver();
   requestAnimationFrame(gameLoop);
   return;
 }

 drawBackground();
 drawPlayer();
 drawItems();
 drawHUD();

 requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
