<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Parabéns Chiquita - Jogo</title>
<style>
body { margin:0; overflow:hidden; background:#ffe4b5; font-family:Arial;}
canvas { display:block; margin:0 auto; background:#87ceeb;}
#startScreen {
  position:absolute; width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#ffb6c1;
}
h1 {
  font-size:40px;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}
button {
  padding:15px 30px;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="startScreen">
  <h1>PARABÉNS CHIQUITA 🎉</h1>
  <button onclick="startGame()">PRESS START</button>
</div>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<audio id="music" src="musica.mp3" loop></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {x:180,y:500,width:50,height:80,speed:6,img:new Image()};
player.img.src="foto1.png";

let items=[];
let score=0;
let missed=0;
let maxMissed=5;
let gameSpeed=3;
let gameOver=false;

const itemImg = new Image();
itemImg.src="foto2.png";

function startGame(){
 document.getElementById("startScreen").style.display="none";
 document.getElementById("music").play();
 gameLoop();
}

function drawPlayer(){
 ctx.fillStyle="#ff69b4";
 ctx.fillRect(player.x+10,player.y+30,30,40);

 ctx.save();
 ctx.beginPath();
 ctx.arc(player.x+25,player.y+20,20,0,Math.PI*2);
 ctx.clip();
 ctx.drawImage(player.img,player.x+5,player.y,40,40);
 ctx.restore();
}

function spawnItem(){
 items.push({x:Math.random()*350,y:-50});
}

function drawItems(){
 items.forEach((item,i)=>{
   item.y+=gameSpeed;

   ctx.drawImage(itemImg,item.x,item.y,40,40);

   // colisão
   if(item.x < player.x+50 &&
      item.x+40 > player.x &&
      item.y < player.y+80 &&
      item.y+40 > player.y){
        items.splice(i,1);
        score++;
        gameSpeed+=0.2;
   }

   if(item.y>600){
     items.splice(i,1);
     missed++;
     if(missed>=maxMissed){
       gameOver=true;
     }
   }
 });
}

let rainOffset=0;
function drawBackground(){
 ctx.fillStyle="#87ceeb";
 ctx.fillRect(0,0,400,600);

 for(let i=0;i<20;i++){
   ctx.drawImage(itemImg,Math.random()*400,(i*40+rainOffset)%600,30,30);
 }
 rainOffset+=2;
}

function drawScore(){
 ctx.fillStyle="#000";
 ctx.fillText("Pontos: "+score,10,20);
 ctx.fillText("Erros: "+missed,10,40);
}

function drawGameOver(){
 ctx.fillStyle="rgba(0,0,0,0.7)";
 ctx.fillRect(0,0,400,600);

 ctx.fillStyle="#fff";
 ctx.font="30px Arial";
 ctx.textAlign="center";
 ctx.fillText("GAME OVER",200,300);
}

document.addEventListener("keydown",e=>{
 if(e.key==="ArrowLeft") player.x-=player.speed;
 if(e.key==="ArrowRight") player.x+=player.speed;
});

setInterval(spawnItem,1000);

function gameLoop(){
 if(gameOver){
   drawGameOver();
   return;
 }

 drawBackground();
 drawPlayer();
 drawItems();
 drawScore();

 requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
