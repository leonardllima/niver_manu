<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Parabéns Chiquita 🎉</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Nunito', sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas { display: block; }

  /* ── START SCREEN ── */
  #start {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #1a0533 0%, #3b0764 40%, #6b21a8 100%);
    z-index: 20;
    gap: 0;
  }

  #confetti-bg {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }

  .conf {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  #title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    color: #fff;
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 0 30px #f0abfc, 0 4px 0 #7e22ce;
    animation: titlePulse 2s ease-in-out infinite alternate;
    padding: 0 16px;
    z-index: 1;
  }

  @keyframes titlePulse {
    from { transform: scale(1);   text-shadow: 0 0 20px #f0abfc, 0 4px 0 #7e22ce; }
    to   { transform: scale(1.04); text-shadow: 0 0 50px #e879f9, 0 4px 0 #581c87; }
  }

  #emoji-row {
    font-size: clamp(1.8rem, 6vw, 3rem);
    margin: 10px 0 20px;
    animation: bounce 1s ease-in-out infinite alternate;
    z-index: 1;
  }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  #subtitle {
    font-size: clamp(0.9rem, 3vw, 1.2rem);
    color: #e9d5ff;
    margin-bottom: 32px;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 1;
  }

  #btn {
    padding: 18px 48px;
    background: linear-gradient(135deg, #f0abfc, #e879f9, #c026d3);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 0 0 30px #e879f9aa, 0 6px 0 #7e22ce;
    transition: transform .1s, box-shadow .1s;
    z-index: 1;
    animation: btnGlow 1.5s ease-in-out infinite alternate;
  }
  @keyframes btnGlow {
    from { box-shadow: 0 0 20px #e879f9aa, 0 6px 0 #7e22ce; }
    to   { box-shadow: 0 0 50px #f0abfccc, 0 6px 0 #581c87; }
  }
  #btn:active { transform: translateY(4px); box-shadow: 0 0 20px #e879f9aa, 0 2px 0 #7e22ce; }

  #hint { color: #c4b5fd; font-size: 0.85rem; margin-top: 20px; z-index: 1; opacity: .8; }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,.7) 0%, transparent 100%);
    pointer-events: none;
    z-index: 10;
  }
  #score-box {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: #f0e6ff;
    text-shadow: 0 0 10px #a855f7;
  }
  #level-box {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #d8b4fe;
    background: rgba(168,85,247,.3);
    padding: 4px 14px;
    border-radius: 20px;
    border: 1px solid #a855f755;
  }

  /* ── CONTROLS ── */
  #controls {
    position: fixed; bottom: 20px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 50px;
    z-index: 10; pointer-events: none;
  }
  .ctrl-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(168,85,247,.35);
    border: 2px solid rgba(240,171,252,.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    pointer-events: all;
    cursor: pointer;
    box-shadow: 0 0 20px #a855f755;
    transition: background .1s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .ctrl-btn:active { background: rgba(168,85,247,.6); }

  /* ── GAME OVER ── */
  #gameover {
    position: fixed; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,0,30,.88);
    z-index: 20; gap: 16px;
    backdrop-filter: blur(6px);
  }
  #gameover h2 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 4rem);
    color: #f0abfc;
    text-shadow: 0 0 30px #e879f9;
  }
  #gameover p {
    color: #d8b4fe;
    font-size: 1.2rem;
  }
  #go-score {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem; color: #fff;
  }
  #restart-btn {
    padding: 14px 40px;
    background: linear-gradient(135deg, #f0abfc, #c026d3);
    color: #fff; border: none; border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem; cursor: pointer;
    box-shadow: 0 0 20px #e879f9aa;
    margin-top: 8px;
  }

  /* ── COLLECT FLASH ── */
  #flash {
    position: fixed; inset: 0; pointer-events: none;
    background: rgba(240,171,252,.18);
    opacity: 0; z-index: 15;
    transition: opacity .08s;
  }
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start">
  <div id="confetti-bg"></div>
  <div id="title">🎉 PARABÉNS<br>CHIQUITA! 🎉</div>
  <div id="emoji-row">🧀🧀🧀</div>
  <div id="subtitle">Colete os pães de queijo!</div>
  <button id="btn">▶ PRESS START</button>
  <div id="hint">Use ← → ou os botões na tela</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score-box">🧀 <span id="sc">0</span></div>
  <div id="level-box">Nível <span id="lv">1</span></div>
</div>

<!-- CANVAS -->
<canvas id="c"></canvas>

<!-- CONTROLS -->
<div id="controls">
  <div class="ctrl-btn" id="btn-l">⬅</div>
  <div class="ctrl-btn" id="btn-r">➡</div>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <h2>Fim de Jogo! 🎊</h2>
  <p>Você coletou</p>
  <div id="go-score">0 pães de queijo</div>
  <button id="restart-btn">↩ Jogar de Novo</button>
</div>

<!-- FLASH -->
<div id="flash"></div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
// ── CONFETTI on start screen ──
(function spawnConf() {
  const bg = document.getElementById('confetti-bg');
  const colors = ['#f0abfc','#e879f9','#fbbf24','#34d399','#60a5fa','#fb7185'];
  for (let i = 0; i < 40; i++) {
    const d = document.createElement('div');
    d.className = 'conf';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.background = colors[Math.floor(Math.random() * colors.length)];
    d.style.animationDuration = (2.5 + Math.random() * 4) + 's';
    d.style.animationDelay = (-Math.random() * 6) + 's';
    d.style.width = d.style.height = (6 + Math.random() * 10) + 'px';
    d.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    bg.appendChild(d);
  }
})();

// ── CANVAS SETUP ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── ASSETS ──
const faceImg = new Image(); faceImg.src = 'foto1.png';
const breadImg = new Image(); breadImg.src = 'foto2.png';
// Fallback colors if images fail
let faceLoaded = false, breadLoaded = false;
faceImg.onload = () => faceLoaded = true;
breadImg.onload = () => breadLoaded = true;

// ── STATE ──
let running = false;
let score = 0;
let level = 1;
let frameCount = 0;

// Player
const player = {
  w: 70, h: 110,
  get x() { return this._x; },
  set x(v) { this._x = Math.max(roadLeft() + 10, Math.min(roadRight() - this.w - 10, v)); },
  _x: 0, y: 0,
  speed: 8
};

// Road
const ROAD_W_FACTOR = 0.55; // fraction of screen width
function roadLeft()  { return canvas.width  * (1 - ROAD_W_FACTOR) / 2; }
function roadRight() { return canvas.width  * (1 + ROAD_W_FACTOR) / 2; }

// Items (bread)
let items = [];
let spawnTimer = 0;
let baseSpawnInterval = 55; // frames

// Road stripes
let stripes = [];
function initStripes() {
  stripes = [];
  for (let i = 0; i < 20; i++) stripes.push(i * (canvas.height / 10));
}
initStripes();

// Roadside trees / decoration
let trees = [];
function initTrees() {
  trees = [];
  for (let i = 0; i < 10; i++) {
    trees.push({ y: Math.random() * canvas.height, side: Math.random() > 0.5 ? 'L' : 'R', size: 18 + Math.random() * 22 });
  }
}
initTrees();

// ── INPUT ──
let goLeft = false, goRight = false;

const btnL = document.getElementById('btn-l');
const btnR = document.getElementById('btn-r');
btnL.addEventListener('touchstart', e => { e.preventDefault(); goLeft = true;  }, { passive: false });
btnL.addEventListener('touchend',   e => { e.preventDefault(); goLeft = false; }, { passive: false });
btnR.addEventListener('touchstart', e => { e.preventDefault(); goRight = true; }, { passive: false });
btnR.addEventListener('touchend',   e => { e.preventDefault(); goRight = false;}, { passive: false });
btnL.addEventListener('mousedown', () => goLeft  = true);
btnL.addEventListener('mouseup',   () => goLeft  = false);
btnR.addEventListener('mousedown', () => goRight = true);
btnR.addEventListener('mouseup',   () => goRight = false);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goLeft  = true;
  if (e.key === 'ArrowRight') goRight = true;
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  goLeft  = false;
  if (e.key === 'ArrowRight') goRight = false;
});

// ── GAME SPEED ──
function roadSpeed() {
  // starts at 4, +0.5 per level, max 14
  return Math.min(4 + (level - 1) * 0.5, 14);
}
function itemFallSpeed() {
  return roadSpeed() + 2;
}
function spawnInterval() {
  return Math.max(20, baseSpawnInterval - (level - 1) * 5);
}

// ── LEVEL from score ──
function calcLevel(s) {
  if (s < 10) return 1;
  if (s < 25) return 2;
  if (s < 45) return 3;
  if (s < 70) return 4;
  if (s < 100) return 5;
  return Math.min(10, 6 + Math.floor((s - 100) / 50));
}

// ── FLASH ──
function flashScreen() {
  const f = document.getElementById('flash');
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity = '0', 80);
}

// ── DRAW FUNCTIONS ──

function drawRoad() {
  const rs = roadSpeed();
  const rl = roadLeft(), rr = roadRight(), rw = rr - rl;
  const cx = canvas.width / 2;
  const h = canvas.height;

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, h * 0.35);
  sky.addColorStop(0, '#0a0a2e');
  sky.addColorStop(1, '#1e0842');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, h * 0.35);

  // Ground sides
  ctx.fillStyle = '#2d1b4e';
  ctx.fillRect(0, h * 0.35, rl, h * 0.65);
  ctx.fillRect(rr, h * 0.35, canvas.width - rr, h * 0.65);

  // Road surface
  const road = ctx.createLinearGradient(0, h * 0.35, 0, h);
  road.addColorStop(0, '#1a0f2e');
  road.addColorStop(0.5, '#2a1a42');
  road.addColorStop(1, '#1a0f2e');
  ctx.fillStyle = road;
  ctx.fillRect(rl, 0, rw, h);

  // Road edges (neon glow)
  ctx.shadowColor = '#a855f7'; ctx.shadowBlur = 14;
  ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(rl, 0); ctx.lineTo(rl, h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rr, 0); ctx.lineTo(rr, h); ctx.stroke();
  ctx.shadowBlur = 0;

  // Center dashed stripes
  ctx.strokeStyle = '#f0e6ff44'; ctx.lineWidth = 4;
  ctx.setLineDash([32, 24]);
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
  ctx.setLineDash([]);

  // Scrolling lane stripes
  stripes.forEach((sy, i) => {
    stripes[i] = (sy + rs) % h;
    ctx.fillStyle = '#ffffff18';
    ctx.fillRect(rl + rw * 0.25 - 6, stripes[i], 12, 22);
    ctx.fillRect(rl + rw * 0.75 - 6, stripes[i], 12, 22);
  });

  // Roadside decoration (trees/bushes)
  trees.forEach(t => {
    t.y += rs;
    if (t.y > h + 50) {
      t.y = -50;
      t.side = Math.random() > 0.5 ? 'L' : 'R';
      t.size = 18 + Math.random() * 22;
    }
    const tx = t.side === 'L' ? rl * 0.5 : rr + (canvas.width - rr) * 0.5;
    // Bush
    ctx.fillStyle = '#4a1d96';
    ctx.beginPath(); ctx.arc(tx, t.y, t.size, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#7e22ce';
    ctx.beginPath(); ctx.arc(tx - t.size * 0.3, t.y - t.size * 0.3, t.size * 0.6, 0, Math.PI * 2); ctx.fill();
    // Tiny star
    ctx.fillStyle = '#e9d5ff';
    ctx.beginPath(); ctx.arc(tx, t.y - t.size, 3, 0, Math.PI * 2); ctx.fill();
  });
}

function drawPlayer() {
  const px = player._x, py = player.y;
  const w = player.w, h = player.h;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.ellipse ? ctx.beginPath() && ctx.ellipse(px + w/2, py + h + 4, w/2.5, 8, 0, 0, Math.PI*2) : null;
  if (ctx.ellipse) ctx.fill();

  // Dress / body
  const dressGrad = ctx.createLinearGradient(px, py + h*0.35, px + w, py + h);
  dressGrad.addColorStop(0, '#f472b6');
  dressGrad.addColorStop(1, '#ec4899');
  ctx.fillStyle = dressGrad;
  // Draw a simple trapezoid dress
  ctx.beginPath();
  ctx.moveTo(px + w*0.3, py + h*0.35);
  ctx.lineTo(px + w*0.7, py + h*0.35);
  ctx.lineTo(px + w*0.95, py + h);
  ctx.lineTo(px + w*0.05, py + h);
  ctx.closePath(); ctx.fill();

  // Arms
  ctx.strokeStyle = '#fca5a5'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(px + w*0.25, py + h*0.4); ctx.lineTo(px - 8, py + h*0.6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px + w*0.75, py + h*0.4); ctx.lineTo(px + w + 8, py + h*0.6); ctx.stroke();

  // Neck
  ctx.fillStyle = '#fca5a5';
  ctx.fillRect(px + w*0.4, py + h*0.25, w*0.2, h*0.12);

  // Head circle (face background)
  ctx.beginPath();
  ctx.arc(px + w/2, py + h*0.22, w*0.38, 0, Math.PI*2);
  ctx.fillStyle = '#fbbf24';
  ctx.fill();

  // Face image or fallback
  const faceR = w * 0.38;
  const faceX = px + w/2 - faceR;
  const faceY = py + h*0.22 - faceR;
  const faceS = faceR * 2;

  if (faceLoaded) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(px + w/2, py + h*0.22, faceR, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(faceImg, faceX, faceY, faceS, faceS);
    ctx.restore();
  } else {
    // Fallback face
    ctx.fillStyle = '#fde68a';
    ctx.beginPath(); ctx.arc(px+w/2, py+h*0.22, faceR, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#92400e';
    ctx.beginPath(); ctx.arc(px+w/2-6, py+h*0.2, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(px+w/2+6, py+h*0.2, 4, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#92400e'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(px+w/2, py+h*0.26, 7, 0, Math.PI); ctx.stroke();
  }

  // Hair
  ctx.fillStyle = '#7c3aed';
  ctx.beginPath();
  ctx.ellipse(px+w/2, py+h*0.08, w*0.38, h*0.14, 0, Math.PI, Math.PI*2);
  ctx.fill();
  // Hair bow
  ctx.fillStyle = '#f0abfc';
  ctx.beginPath();
  ctx.ellipse(px+w/2 + w*0.28, py+h*0.06, 10, 7, Math.PI/4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(px+w/2 + w*0.28, py+h*0.06, 10, 7, -Math.PI/4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#e879f9'; ctx.beginPath(); ctx.arc(px+w/2+w*0.28, py+h*0.06, 4,0,Math.PI*2); ctx.fill();

  // Legs
  ctx.fillStyle = '#fca5a5'; ctx.lineWidth = 1;
  ctx.fillRect(px + w*0.3, py + h*0.92, w*0.15, h*0.08);
  ctx.fillRect(px + w*0.55, py + h*0.92, w*0.15, h*0.08);
  // Shoes
  ctx.fillStyle = '#7c3aed';
  ctx.fillRect(px + w*0.27, py + h*0.98, w*0.2, h*0.04);
  ctx.fillRect(px + w*0.53, py + h*0.98, w*0.2, h*0.04);
}

function drawBread(it) {
  if (breadLoaded) {
    // Glow
    ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 18;
    ctx.drawImage(breadImg, it.x, it.y, it.s, it.s);
    ctx.shadowBlur = 0;
  } else {
    // Fallback pão de queijo
    ctx.shadowColor = '#fbbf24'; ctx.shadowBlur = 18;
    const grad = ctx.createRadialGradient(it.x+it.s/2, it.y+it.s/2, 2, it.x+it.s/2, it.y+it.s/2, it.s/2);
    grad.addColorStop(0, '#fef3c7');
    grad.addColorStop(0.6, '#fcd34d');
    grad.addColorStop(1, '#f59e0b');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(it.x+it.s/2, it.y+it.s/2, it.s/2, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#d97706'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(it.x+it.s/2, it.y+it.s/2, it.s/2, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold '+(it.s*0.5)+'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline='middle';
    ctx.fillText('🧀', it.x+it.s/2, it.y+it.s/2);
  }
}

// ── PARTICLES (collect effect) ──
let particles = [];
function spawnParticles(x, y) {
  const colors = ['#f0abfc','#fbbf24','#34d399','#60a5fa','#fb7185'];
  for (let i = 0; i < 14; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 9,
      vy: (Math.random() - 0.5) * 9 - 3,
      r: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1
    });
  }
}
function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.25;
    p.life -= 0.035;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── POPUP SCORE TEXT ──
let popups = [];
function spawnPopup(x, y, text) {
  popups.push({ x, y, text, life: 1 });
}
function updatePopups() {
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y -= 1.5;
    p.life -= 0.025;
    if (p.life <= 0) { popups.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 22px "Fredoka One", cursive';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// ── SPAWN ITEMS ──
function spawnItem() {
  const rl = roadLeft(), rr = roadRight();
  const margin = 20;
  const s = 44 + Math.random() * 18;
  const x = rl + margin + Math.random() * (rr - rl - s - margin * 2);
  items.push({ x, y: -s - 10, s, v: itemFallSpeed() });
}

// ── COLLISION ──
function checkCollision(it) {
  const px = player._x, py = player.y, pw = player.w, ph = player.h;
  // Slightly smaller hitbox
  return (
    it.x + it.s * 0.2 < px + pw * 0.85 &&
    it.x + it.s * 0.8 > px + pw * 0.15 &&
    it.y + it.s * 0.2 < py + ph &&
    it.y + it.s * 0.8 > py + ph * 0.35
  );
}

// ── UPDATE ──
function update() {
  frameCount++;

  // Move player
  if (goLeft)  player.x = player._x - player.speed;
  if (goRight) player.x = player._x + player.speed;

  // Spawn items
  spawnTimer++;
  if (spawnTimer >= spawnInterval()) {
    spawnItem();
    spawnTimer = 0;
  }

  // Move + check items
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.y += it.v;

    if (checkCollision(it)) {
      items.splice(i, 1);
      score++;
      level = calcLevel(score);
      document.getElementById('sc').textContent = score;
      document.getElementById('lv').textContent = level;
      spawnParticles(it.x + it.s/2, it.y + it.s/2);
      spawnPopup(it.x + it.s/2, it.y, '+1 🧀');
      flashScreen();
      continue;
    }

    if (it.y > canvas.height + 10) {
      items.splice(i, 1);
    }
  }
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRoad();
  for (const it of items) drawBread(it);
  drawPlayer();
  updateParticles();
  updatePopups();
}

// ── LOOP ──
let animId;
function loop() {
  if (!running) return;
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

// ── START ──
function startGame() {
  score = 0; level = 1; frameCount = 0;
  items = []; particles = []; popups = [];
  spawnTimer = 0;

  player._x = canvas.width / 2 - player.w / 2;
  player.y = canvas.height - player.h - 80;

  initStripes(); initTrees();

  document.getElementById('sc').textContent = '0';
  document.getElementById('lv').textContent = '1';
  document.getElementById('gameover').style.display = 'none';

  running = true;
  loop();
}

// ── START BUTTON ──
document.getElementById('btn').addEventListener('click', () => {
  document.getElementById('start').style.display = 'none';
  document.getElementById('music').play().catch(() => {});
  startGame();
});

// ── RESTART BUTTON ──
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('music').play().catch(() => {});
  startGame();
});
</script>
