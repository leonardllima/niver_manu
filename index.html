<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário 🎉</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
canvas{display:block}
#start{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#222;color:#fff;z-index:10}
#btn{padding:16px 28px;background:#fff;color:#ff4d6d;border-radius:10px;font-size:22px;margin-top:16px}
#header{position:absolute;top:10px;width:100%;text-align:center;color:#fff;font-size:20px}
#controls{position:fixed;bottom:20px;width:100%;display:flex;justify-content:center;gap:40px}
.ctrl{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.25);text-align:center;line-height:70px;font-size:28px}
</style>
</head>
<body>

<div id="start">
  <h1>🎉 FELIZ ANIVERSÁRIO CHIQUITA 🎉</h1>
  <div id="btn">▶ PRESS START</div>
</div>

<div id="header">Colete os pães de queijo 🧀</div>

<canvas id="c"></canvas>

<div id="controls">
  <div class="ctrl" id="l">⬅️</div>
  <div class="ctrl" id="r">➡️</div>
</div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const c=document.getElementById("c"),ctx=c.getContext("2d");
function rs(){c.width=innerWidth;c.height=innerHeight}
rs(); onresize=rs;

const head=new Image(); head.src="foto1.jpg";
const bread=new Image(); bread.src="foto2.jpg";

let start=false, ml=false, mr=false, score=0;

const p={x:c.width/2,y:c.height-140,w:80,h:110,s:7};
let items=[];

l.ontouchstart=()=>ml=true; l.ontouchend=()=>ml=false;
r.ontouchstart=()=>mr=true; r.ontouchend=()=>mr=false;
onkeydown=e=>{if(e.key==="ArrowLeft")ml=true; if(e.key==="ArrowRight")mr=true;}
onkeyup=e=>{if(e.key==="ArrowLeft")ml=false; if(e.key==="ArrowRight")mr=false;}

btn.onclick=()=>{
  start=true;
  document.getElementById("start").style.display="none";
  document.getElementById("music").play().catch(()=>{});
  setInterval(()=>items.push({x:Math.random()*(c.width-40),y:-40,s:40,v:4}),700);
};

let lines=Array.from({length:25},(_,i)=>i*30);
function bg(){
  ctx.fillStyle="#111"; ctx.fillRect(0,0,c.width,c.height);
  ctx.strokeStyle="#fff"; ctx.lineWidth=3;
  for(let i=0;i<lines.length;i++){
    lines[i]+=10; if(lines[i]>c.height) lines[i]=-20;
    ctx.beginPath(); ctx.moveTo(c.width/2,lines[i]); ctx.lineTo(c.width/2,lines[i]+25); ctx.stroke();
  }
}

function upd(){
  if(!start) return;
  if(ml && p.x>0) p.x-=p.s;
  if(mr && p.x<c.width-p.w) p.x+=p.s;

  for(let i=items.length-1;i>=0;i--){
    let it=items[i]; it.y+=it.v;
    if(it.x<p.x+p.w && it.x+it.s>p.x && it.y<p.y+p.h && it.y+it.s>p.y){
      items.splice(i,1); score++; continue;
    }
    if(it.y>c.height) items.splice(i,1);
  }
}

function draw(){
  bg();

  ctx.fillStyle="#ffb6c1";
  ctx.fillRect(p.x+20,p.y+40,40,60);

  if(head.complete) ctx.drawImage(head,p.x+10,p.y,60,60);

  for(const it of items){
    if(bread.complete) ctx.drawImage(bread,it.x,it.y,it.s,it.s);
    else { ctx.fillStyle="yellow"; ctx.fillRect(it.x,it.y,it.s,it.s); }
  }

  ctx.fillStyle="#fff"; ctx.font="20px Arial";
  ctx.fillText("Pontos: "+score,20,40);
}

(function loop(){ upd(); draw(); requestAnimationFrame(loop); })();
</script>

</body>
</html>
